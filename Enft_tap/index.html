<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>⚡ EnFT · Тапай и улучшай</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #0b0a0c;
      background-image: radial-gradient(circle at 30% 20%, #1f1a2e 0%, #050407 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      margin: 0;
    }

    .game-container {
      max-width: 480px;
      width: 100%;
      background: rgba(12, 10, 15, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 180, 40, 0.25);
      border-radius: 48px;
      padding: 28px 20px 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), 0 0 0 2px rgba(255, 140, 0, 0.1);
    }

    .balance-section {
      text-align: center;
      margin-bottom: 20px;
    }

    .balance-label {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #a98b6f;
      text-shadow: 0 0 6px #ff8c00;
    }

    .balance-value {
      font-size: 68px;
      font-weight: 800;
      color: #ffe8c7;
      text-shadow: 0 0 20px #ff9f2e, 0 4px 8px rgba(0,0,0,0.6);
      line-height: 1.1;
    }

    .enft-symbol {
      font-size: 28px;
      margin-left: 4px;
      color: #f7b32b;
    }

    .stats-row {
      display: flex;
      justify-content: center;
      background: rgba(20, 15, 28, 0.7);
      border-radius: 100px;
      padding: 12px 18px;
      margin: 16px 0 12px;
      border: 1px solid #3e2e1c;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stat-label {
      font-size: 13px;
      color: #a3907a;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: #ffd7a0;
    }

    .tap-area {
      display: flex;
      justify-content: center;
      margin: 18px 0 24px;
    }

    .coin-button {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      border-radius: 50%;
      transition: transform 0.08s cubic-bezier(0.2, 0.9, 0.4, 1);
      filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.6));
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    .coin-button:active {
      transform: scale(0.88);
    }

    .coin-gfx {
      width: 200px;
      height: 200px;
      background: radial-gradient(circle at 30% 25%, #fde7b4, #e09d32 70%, #8f5e1a);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px #f90, inset 0 -8px 8px rgba(0,0,0,0.4), inset 0 5px 10px #fff3cf;
      border: 4px solid #fec26e;
    }

    .coin-gfx span {
      font-size: 64px;
      font-weight: 900;
      color: #201508;
      text-shadow: 2px 4px 0 #ffd58c;
      letter-spacing: 2px;
      transform: rotate(-5deg);
    }

    .upgrade-card {
      background: rgba(22, 16, 28, 0.9);
      border: 1.5px solid #4d3824;
      border-radius: 28px;
      padding: 18px;
      margin-bottom: 16px;
      backdrop-filter: blur(8px);
      box-shadow: 0 6px 0 #0e0b12;
    }

    .upgrade-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }

    .upgrade-title {
      font-size: 18px;
      font-weight: 700;
      color: #ffdca8;
    }

    .upgrade-cost {
      font-size: 20px;
      font-weight: 800;
      color: #f5b342;
      text-shadow: 0 0 6px #ffae00;
    }

    .upgrade-desc {
      font-size: 15px;
      color: #c0b09c;
      margin-bottom: 16px;
    }

    .level-badge {
      background: #2d231b;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 600;
      color: #efc48c;
      margin-left: 8px;
      border: 1px solid #7a5f3f;
    }

    .buy-btn {
      width: 100%;
      background: #2f261b;
      border: 1px solid #cf9f4a;
      color: #ffeec2;
      font-weight: 700;
      font-size: 18px;
      padding: 14px 10px;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 5px 0 #14100c;
    }

    .buy-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #14100c;
    }

    .buy-btn.disabled {
      opacity: 0.4;
      filter: grayscale(0.5);
      pointer-events: none;
    }

    .status-message {
      text-align: center;
      margin-top: 18px;
      min-height: 24px;
      font-weight: 500;
      color: #ecbf7e;
      font-size: 15px;
    }

    .floating-number {
      position: fixed;
      font-weight: 900;
      color: #fdebb3;
      text-shadow: 0 0 18px #ffaa33, 0 2px 4px black;
      font-size: 36px;
      pointer-events: none;
      z-index: 9999;
      animation: floatUp 0.9s ease-out forwards;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      80% { opacity: 0.8; transform: translateY(-70px) scale(1.2); }
      100% { opacity: 0; transform: translateY(-110px) scale(0.8); }
    }

    @media (max-width: 420px) {
      .game-container { padding: 20px 14px; }
      .balance-value { font-size: 56px; }
      .coin-gfx { width: 170px; height: 170px; }
      .coin-gfx span { font-size: 54px; }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="balance-section">
    <div class="balance-label">EnFT BALANCE</div>
    <div class="balance-value">
      <span id="balanceDisplay">0</span><span class="enft-symbol">⚡</span>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-item">
      <span class="stat-label">СИЛА ТАПА</span>
      <span class="stat-value" id="tapPowerDisplay">1.0</span>
    </div>
  </div>

  <div class="tap-area">
    <button class="coin-button" id="tapButton">
      <div class="coin-gfx">
        <span>EnFT</span>
      </div>
    </button>
  </div>

  <!-- Апгрейд силы тапа -->
  <div class="upgrade-card">
    <div class="upgrade-header">
      <span class="upgrade-title">💪 УЛУЧШИТЬ ТАП</span>
      <span class="upgrade-cost" id="tapCostDisplay">10</span>
    </div>
    <div class="upgrade-desc">
      <span>+0.2 EnFT за клик</span>
      <span class="level-badge" id="tapLevelDisplay">ур. 1</span>
    </div>
    <button class="buy-btn" id="buyTapBtn">КУПИТЬ</button>
  </div>

  <div id="messageArea" class="status-message"></div>
</div>

<script>
  (function(){
    // ---------- НАСТРОЙКИ ----------
    let balance = 0;
    let tapPower = 1.0;
    let upgradeLevel = 1;
    let currentUpgradeCost = 10;
    
    const UPGRADE_STEP = 0.2;      // +0.2 за клик за апгрейд
    const COST_MULTIPLIER = 1.45;   // цена умножается на 1.45 после покупки

    // UI элементы
    const balanceSpan = document.getElementById('balanceDisplay');
    const tapPowerSpan = document.getElementById('tapPowerDisplay');
    const tapCostSpan = document.getElementById('tapCostDisplay');
    const tapLevelSpan = document.getElementById('tapLevelDisplay');
    const messageDiv = document.getElementById('messageArea');
    const tapButton = document.getElementById('tapButton');
    const buyTapBtn = document.getElementById('buyTapBtn');

    let isInitialized = false;

    // ---------- ВСПЛЫВАЮЩИЕ ЦИФРЫ ----------
    function showFloatingNumber(x, y, amount) {
      const floatEl = document.createElement('div');
      floatEl.className = 'floating-number';
      floatEl.textContent = `+${amount.toFixed(1)}`;
      floatEl.style.left = (x - 20) + 'px';
      floatEl.style.top = (y - 30) + 'px';
      document.body.appendChild(floatEl);
      setTimeout(() => { floatEl.remove(); }, 900);
    }

    // ---------- ОБНОВЛЕНИЕ UI ----------
    function refreshUI() {
      balanceSpan.textContent = Math.floor(balance);
      tapPowerSpan.textContent = tapPower.toFixed(1);
      tapCostSpan.textContent = Math.floor(currentUpgradeCost);
      tapLevelSpan.textContent = `ур. ${upgradeLevel}`;

      if (balance < currentUpgradeCost) {
        buyTapBtn.classList.add('disabled');
      } else {
        buyTapBtn.classList.remove('disabled');
      }
    }

    // ---------- СОХРАНЕНИЕ ----------
    function saveGame() {
      if (!isInitialized) return;
      const gameState = {
        balance: balance,
        tapPower: tapPower,
        upgradeLevel: upgradeLevel,
        currentUpgradeCost: currentUpgradeCost
      };
      localStorage.setItem('enft_memecoin', JSON.stringify(gameState));
    }

    function loadGame() {
      const saved = localStorage.getItem('enft_memecoin');
      if (!saved) return;
      try {
        const data = JSON.parse(saved);
        balance = data.balance ?? 0;
        tapPower = data.tapPower ?? 1.0;
        upgradeLevel = data.upgradeLevel ?? 1;
        currentUpgradeCost = data.currentUpgradeCost ?? 10;
        if (currentUpgradeCost < 10) currentUpgradeCost = 10;
      } catch(e) {}
    }

    // ---------- ПОКУПКА АПГРЕЙДА ----------
    function buyTapUpgrade() {
      if (balance < currentUpgradeCost) {
        messageDiv.textContent = '❌ Не хватает EnFT!';
        return;
      }
      
      balance -= currentUpgradeCost;
      tapPower += UPGRADE_STEP;
      upgradeLevel++;
      currentUpgradeCost = Math.floor(currentUpgradeCost * COST_MULTIPLIER);
      
      messageDiv.textContent = `⚡ Тап улучшен до ${tapPower.toFixed(1)} EnFT!`;
      refreshUI();
      saveGame();
    }

    // ---------- ТАП ПО МОНЕТЕ ----------
    function handleTap(event) {
      const earned = tapPower;
      balance += earned;
      
      let clientX, clientY;
      if (event.clientX) {
        clientX = event.clientX;
        clientY = event.clientY;
      } else {
        const rect = tapButton.getBoundingClientRect();
        clientX = rect.left + rect.width / 2;
        clientY = rect.top + rect.height / 2;
      }
      showFloatingNumber(clientX, clientY, earned);
      
      refreshUI();
      saveGame();
      messageDiv.textContent = `+${earned.toFixed(1)} EnFT!`;
      
      setTimeout(() => {
        if (messageDiv.textContent.includes('+')) {
          // оставляем последнее сообщение, но можно очистить
        }
      }, 800);
    }

    // ---------- ЗАПУСК ----------
    function init() {
      loadGame();
      isInitialized = true;
      refreshUI();
      
      tapButton.addEventListener('click', handleTap);
      buyTapBtn.addEventListener('click', buyTapUpgrade);
      
      tapButton.addEventListener('touchstart', (e) => {}, { passive: true });
      
      window.addEventListener('beforeunload', () => saveGame());
    }

    init();
  })();
</script>
</body>
</html>
