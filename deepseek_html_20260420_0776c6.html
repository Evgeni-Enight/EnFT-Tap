<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EnFT Tap — кликер мемкоина</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0c12, #030507);
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Главная карточка */
        .game-container {
            max-width: 500px;
            width: 100%;
            background: rgba(12, 15, 25, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 64px;
            border: 1px solid rgba(255, 180, 40, 0.4);
            box-shadow: 0 25px 45px rgba(0,0,0,0.6), 0 0 0 1px rgba(255, 140, 0, 0.2) inset, 0 0 20px rgba(255, 100, 0, 0.3);
            padding: 24px 20px 40px;
            transition: all 0.2s;
        }

        /* баланс */
        .balance-area {
            text-align: center;
            margin-bottom: 20px;
        }

        .balance-label {
            color: #ffb347;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 14px;
            font-weight: 600;
            text-shadow: 0 0 4px #ff7e05;
        }

        .balance-value {
            font-size: 64px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD966, #FF8C00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            letter-spacing: 2px;
            line-height: 1.1;
        }

        .per-tap-box {
            background: #1e1f2c;
            border-radius: 60px;
            padding: 8px 16px;
            display: inline-block;
            margin-top: 8px;
            font-weight: bold;
            color: #FFB347;
            border: 1px solid #ffb34750;
            font-size: 18px;
        }

        /* монета / кнопка клика */
        .click-area {
            display: flex;
            justify-content: center;
            margin: 25px 0 30px;
        }

        .tap-coin {
            width: 220px;
            height: 220px;
            background: radial-gradient(circle at 35% 35%, #FFD966, #E67E22);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 48px;
            color: #2c1a0a;
            text-shadow: 2px 2px 0 #ffcd94;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5), 0 0 0 8px rgba(255,140,0,0.3), 0 0 0 12px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.08s linear;
            will-change: transform;
            backdrop-filter: blur(2px);
            font-family: monospace;
            letter-spacing: 2px;
        }

        .tap-coin:active {
            transform: scale(0.94);
        }

        /* эффект вибрации (имитация) */
        .shake-effect {
            animation: coinPop 0.12s ease-out;
        }

        @keyframes coinPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.07); filter: brightness(1.2);}
            100% { transform: scale(1); }
        }

        /* панель апгрейдов */
        .upgrades {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 15px;
        }

        .upgrade-card {
            background: rgba(0, 0, 0, 0.55);
            border-radius: 44px;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 160, 60, 0.5);
            transition: 0.1s;
        }

        .upgrade-info h4 {
            font-size: 18px;
            color: #FFD966;
        }

        .upgrade-info p {
            font-size: 13px;
            color: #bbb;
            margin-top: 5px;
        }

        .upgrade-price {
            background: #2a241a;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: bold;
            color: #FFA559;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        button.buy-btn {
            background: linear-gradient(95deg, #FF8C00, #FFB347);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 18px;
            color: #1f1b12;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            font-family: inherit;
        }

        button.buy-btn:active {
            transform: scale(0.96);
        }

        button.buy-btn.disabled-btn {
            opacity: 0.5;
            transform: none;
            pointer-events: none;
            filter: grayscale(0.1);
        }

        .stats-mini {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            background: #00000055;
            padding: 10px 20px;
            border-radius: 60px;
            font-size: 14px;
            color: #ffb86b;
        }

        .reset-area {
            text-align: center;
            margin-top: 20px;
        }

        .reset-btn {
            background: none;
            border: 1px solid #ff7b2c55;
            color: #ff9955;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
        }

        /* анимация всплывающего урона (+1 и тд) */
        .floating-number {
            position: fixed;
            pointer-events: none;
            font-weight: 800;
            font-size: 28px;
            background: linear-gradient(135deg, gold, orange);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 5px black;
            z-index: 1000;
            animation: floatUp 0.7s ease-out forwards;
            font-family: monospace;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translate(-50%, -30%) scale(0.8);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -130%) scale(1.3);
            }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="balance-area">
        <div class="balance-label">💰 ENIGHT BALANCE 💰</div>
        <div class="balance-value" id="balanceDisplay">0</div>
        <div class="per-tap-box">
            ⚡ +<span id="tapPowerDisplay">1</span> EnFT / клик
        </div>
    </div>

    <div class="click-area">
        <div class="tap-coin" id="tapCoin">
            EnFT
        </div>
    </div>

    <div class="upgrades">
        <!-- Апгрейд увеличения клика: 1.0 → с прогрессией -->
        <div class="upgrade-card">
            <div class="upgrade-info">
                <h4>📈 Улучшить удар</h4>
                <p>+0.2 EnFT за клик</p>
            </div>
            <div class="upgrade-price">
                <span id="tapUpgradeCost">10</span> EnFT
                <button class="buy-btn" id="buyTapUpgradeBtn">💎</button>
            </div>
        </div>

        <!-- Апгрейд крит-прогресс: но сделаем более острый, вместо пассива — мультипликатор темпа  -->
        <div class="upgrade-card">
            <div class="upgrade-info">
                <h4>⚡ КОМБО-ЗАРЯД</h4>
                <p>+0.3 EnFT за клик (ступенчато)</p>
            </div>
            <div class="upgrade-price">
                <span id="comboUpgradeCost">25</span> EnFT
                <button class="buy-btn" id="buyComboBtn">🔥</button>
            </div>
        </div>
    </div>

    <div class="stats-mini">
        <span>🎯 Сила тапа: <strong id="tapPowerStat">1.0</strong></span>
        <span>🏆 Уровень EnFT: <strong id="levelStat">0</strong></span>
    </div>
    <div class="reset-area">
        <button class="reset-btn" id="resetGameBtn">⟳ перезапустить игру (сброс)</button>
    </div>
</div>

<script>
    // ---------- Игровая логика EnFT ----------
    // данные
    let balance = 0;            // текущий баланс EnFT
    let tapPower = 1.0;        // монет за 1 клик
    
    // стоимости апгрейдов (динамически растут)
    let tapUpgradeCost = 10;        // улучшает tapPower на +0.2
    let comboUpgradeCost = 25;      // улучшает tapPower на +0.3 (больше эффективности)
    
    // вспомогательные переменные для UI
    let clickProtection = false; // просто защита от спама на время анимации? не блокируем клики, но ограничим баги через обычную обработку
    
    // DOM элементы
    const balanceDisplay = document.getElementById('balanceDisplay');
    const tapPowerDisplay = document.getElementById('tapPowerDisplay');
    const tapPowerStat = document.getElementById('tapPowerStat');
    const levelStatSpan = document.getElementById('levelStat');
    const tapUpgradeCostSpan = document.getElementById('tapUpgradeCost');
    const comboUpgradeCostSpan = document.getElementById('comboUpgradeCost');
    
    const buyTapUpgradeBtn = document.getElementById('buyTapUpgradeBtn');
    const buyComboBtn = document.getElementById('buyComboBtn');
    const resetBtn = document.getElementById('resetGameBtn');
    const tapCoin = document.getElementById('tapCoin');
    
    // Функция обновления UI (баланс, силы, стоимости)
    function updateUI() {
        // Форматирование баланса без .0000, но с 2 знаками для эстетики
        balanceDisplay.innerText = Math.floor(balance * 10) / 10;
        tapPowerDisplay.innerText = tapPower.toFixed(2);
        tapPowerStat.innerText = tapPower.toFixed(2);
        
        // стоимость апгрейдов
        tapUpgradeCostSpan.innerText = Math.floor(tapUpgradeCost);
        comboUpgradeCostSpan.innerText = Math.floor(comboUpgradeCost);
        
        // подсветка кнопок если не хватает
        if (balance >= tapUpgradeCost) {
            buyTapUpgradeBtn.classList.remove('disabled-btn');
        } else {
            buyTapUpgradeBtn.classList.add('disabled-btn');
        }
        
        if (balance >= comboUpgradeCost) {
            buyComboBtn.classList.remove('disabled-btn');
        } else {
            buyComboBtn.classList.add('disabled-btn');
        }
        
        // вычисляем примерный уровень (просто геймификация)
        let estimatedLevel = Math.floor(tapPower * 2.5);
        levelStatSpan.innerText = estimatedLevel;
    }
    
    // сохранить всё в localStorage
    function saveGame() {
        const saveData = {
            balance: balance,
            tapPower: tapPower,
            tapUpgradeCost: tapUpgradeCost,
            comboUpgradeCost: comboUpgradeCost
        };
        localStorage.setItem('EnFT_Save', JSON.stringify(saveData));
    }
    
    // загрузка сохранения
    function loadGame() {
        const rawSave = localStorage.getItem('EnFT_Save');
        if (!rawSave) return;
        try {
            const data = JSON.parse(rawSave);
            if (typeof data.balance === 'number') balance = data.balance;
            if (typeof data.tapPower === 'number') tapPower = data.tapPower;
            if (typeof data.tapUpgradeCost === 'number') tapUpgradeCost = data.tapUpgradeCost;
            if (typeof data.comboUpgradeCost === 'number') comboUpgradeCost = data.comboUpgradeCost;
        } catch(e) { console.warn(e); }
        // минимальная защита от отрицательных/NaN
        if (isNaN(balance)) balance = 0;
        if (tapPower < 0.2) tapPower = 1.0;
        if (tapUpgradeCost < 5) tapUpgradeCost = 10;
        if (comboUpgradeCost < 15) comboUpgradeCost = 25;
    }
    
    // всплывающая анимация (+ значение)
    function showFloatingNumber(x, y, value) {
        const floatDiv = document.createElement('div');
        floatDiv.className = 'floating-number';
        // округление до десятых
        let displayValue = value.toFixed(2);
        floatDiv.innerText = `+${displayValue}`;
        floatDiv.style.left = `${x}px`;
        floatDiv.style.top = `${y}px`;
        document.body.appendChild(floatDiv);
        setTimeout(() => { floatDiv.remove(); }, 700);
    }
    
    // эффект вибрации/встряски (имитация)
    function playTapEffect() {
        tapCoin.classList.add('shake-effect');
        setTimeout(() => {
            tapCoin.classList.remove('shake-effect');
        }, 120);
        // лёгкая вибрация если поддерживается (опционально)
        if (navigator.vibrate) navigator.vibrate(20);
    }
    
    // ОСНОВНОЙ КЛИК (тап по монете)
    function handleTap(event) {
        // получаем координаты для всплывающего текста
        let clientX = event.clientX;
        let clientY = event.clientY;
        if (!clientX || !clientY) {
            // если тач или клик без координат - центр кнопки
            const rect = tapCoin.getBoundingClientRect();
            clientX = rect.left + rect.width / 2;
            clientY = rect.top + rect.height / 2;
        }
        
        // начисляем баланс
        balance += tapPower;
        // анимация
        showFloatingNumber(clientX, clientY, tapPower);
        playTapEffect();
        
        // обновить отображение и сохранить
        updateUI();
        saveGame();
    }
    
    // Апгрейд "Улучшить удар" (+0.2 сила тапа)
    function upgradeTap() {
        if (balance >= tapUpgradeCost) {
            balance -= tapUpgradeCost;
            tapPower += 0.2;
            // динамическое увеличение стоимости: формула, чтобы интересно было
            tapUpgradeCost = Math.floor(tapUpgradeCost * 1.45);  // каждый раз цена растёт на 45%
            if (tapUpgradeCost > 9999) tapUpgradeCost = 9999;
            // небольшой лимит для бесконечности
            updateUI();
            saveGame();
            // дополнительный фидбек
            tapCoin.style.transform = 'scale(0.98)';
            setTimeout(() => { tapCoin.style.transform = ''; }, 100);
        } else {
            // мигание ошибкой
            const btn = buyTapUpgradeBtn;
            btn.style.filter = 'brightness(0.7)';
            setTimeout(() => btn.style.filter = '', 300);
        }
    }
    
    // Апгрейд КОМБО-ЗАРЯД: добавляет +0.3 за клик (выгоднее)
    function upgradeCombo() {
        if (balance >= comboUpgradeCost) {
            balance -= comboUpgradeCost;
            tapPower += 0.3;
            // стоимость комбо тоже растёт быстрее, но интереснее
            comboUpgradeCost = Math.floor(comboUpgradeCost * 1.6);
            if (comboUpgradeCost > 13000) comboUpgradeCost = 13000;
            updateUI();
            saveGame();
            // фидбек
            tapCoin.style.filter = 'drop-shadow(0 0 6px gold)';
            setTimeout(() => tapCoin.style.filter = '', 200);
        } else {
            const btn = buyComboBtn;
            btn.style.filter = 'brightness(0.6)';
            setTimeout(() => btn.style.filter = '', 300);
        }
    }
    
    // полный сброс (очистка)
    function resetGame() {
        if (confirm('Сбросить всю вселенную EnFT? Баланс и улучшения обнулятся.')) {
            balance = 0;
            tapPower = 1.0;
            tapUpgradeCost = 10;
            comboUpgradeCost = 25;
            updateUI();
            saveGame();
            // эффект перезагрузки
            alert('🌀 EnFT перерождён. Начинай тапать заново!');
        }
    }
    
    // обработчики событий
    tapCoin.addEventListener('click', handleTap);
    buyTapUpgradeBtn.addEventListener('click', upgradeTap);
    buyComboBtn.addEventListener('click', upgradeCombo);
    resetBtn.addEventListener('click', resetGame);
    
    // для тач-событий корректная работа всплывающих координат
    tapCoin.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        const fakeEvent = { clientX: touch.clientX, clientY: touch.clientY };
        handleTap(fakeEvent);
    });
    
    // загружаем данные при старте
    loadGame();
    updateUI();
    
    // дополнительный стиль кнопок disabled при загрузке
    function checkDisableStatus() {
        if (balance < tapUpgradeCost) buyTapUpgradeBtn.classList.add('disabled-btn');
        else buyTapUpgradeBtn.classList.remove('disabled-btn');
        
        if (balance < comboUpgradeCost) buyComboBtn.classList.add('disabled-btn');
        else buyComboBtn.classList.remove('disabled-btn');
    }
    
    // обновлять при каждом изменении
    const origUpdate = updateUI;
    window.updateUI = function() {
        origUpdate();
        checkDisableStatus();
    };
    updateUI();
    checkDisableStatus();
    
    // фикс для смены баланса отображения
    setInterval(() => {
        // просто поддерживаем сохранение каждые 30 сек, но главное при любом клике сохраняем
        saveGame();
    }, 15000);
</script>
</body>
</html>
