<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EnFT Tap · Мемкоин с профилем</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      background-image: radial-gradient(circle at 30% 20%, #1a1425 0%, #030205 100%);
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      transition: background-image 0.3s ease;
    }

    /* Фоны */
    body.bg-default {
      background-image: radial-gradient(circle at 30% 20%, #1a1425 0%, #030205 100%);
    }

    body.bg-neon {
      background-image: linear-gradient(135deg, #0a0a2e 0%, #1a0a2e 50%, #0a1a2e 100%);
    }

    body.bg-gold {
      background-image: radial-gradient(circle at 70% 30%, #3a2a0a 0%, #0a0a05 100%);
    }

    body.bg-matrix {
      background-image: linear-gradient(0deg, #0a1a0a 0%, #020302 100%);
    }

    body.bg-sunset {
      background-image: linear-gradient(45deg, #2e0a0a 0%, #2e1a0a 50%, #1a0a2e 100%);
    }

    body.bg-ocean {
      background-image: linear-gradient(180deg, #0a1a2e 0%, #0a2e1a 100%);
    }

    .game-container {
      max-width: 480px;
      width: 100%;
      background: rgba(8, 6, 12, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid #ff8c00;
      border-radius: 40px;
      padding: 24px 20px 30px;
      box-shadow: 0 20px 40px #000, 0 0 20px #ff8c0040;
    }

    /* Экран регистрации */
    .register-screen {
      text-align: center;
      padding: 20px 10px;
    }

    .register-title {
      font-size: 28px;
      font-weight: 800;
      color: #ffd28f;
      text-shadow: 0 0 20px #ff8c00;
      margin-bottom: 30px;
    }

    .register-input {
      width: 100%;
      padding: 16px 20px;
      background: #1a1425;
      border: 2px solid #ff8c00;
      border-radius: 50px;
      color: #ffdca8;
      font-size: 18px;
      outline: none;
      margin-bottom: 15px;
      text-align: center;
    }

    .register-input::placeholder {
      color: #8a7a5f;
    }

    .register-input[type="password"] {
      -webkit-text-security: disc;
    }

    .register-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #ff8c00, #ffaa33);
      border: none;
      border-radius: 50px;
      color: #0a0a0f;
      font-weight: 800;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 0 30px #ff8c0080;
      transition: 0.2s;
      margin-top: 10px;
    }

    .register-btn:active {
      transform: scale(0.95);
    }

    .auth-toggle {
      color: #b89b72;
      margin-top: 15px;
      cursor: pointer;
      font-size: 14px;
    }

    .auth-toggle:hover {
      color: #ffc978;
    }

    /* Основной экран */
    .main-screen {
      display: none;
    }

    .profile-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding: 10px 15px;
      background: #1a142580;
      border-radius: 50px;
      border: 1px solid #ff8c0050;
    }

    .profile-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .profile-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #ff8c00, #ffaa33);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 18px;
      color: #0a0a0f;
    }

    .profile-name {
      font-size: 16px;
      font-weight: 600;
      color: #ffdca8;
    }

    .logout-btn {
      background: none;
      border: 1px solid #ff8c0080;
      color: #b89b72;
      padding: 6px 15px;
      border-radius: 30px;
      font-size: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .logout-btn:active {
      background: #ff8c0030;
    }

    .balance-section {
      text-align: center;
      margin-bottom: 15px;
    }

    .balance-label {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 3px;
      color: #cc9f5f;
      text-transform: uppercase;
    }

    .balance-value {
      font-size: 56px;
      font-weight: 800;
      color: #ffd28f;
      text-shadow: 0 0 30px #ff8c00;
      line-height: 1.2;
    }

    .stats-row {
      display: flex;
      justify-content: space-around;
      background: #1a1425;
      border-radius: 50px;
      padding: 12px;
      margin: 20px 0;
      border: 1px solid #ff8c0050;
    }

    .stat-item {
      text-align: center;
    }

    .stat-label {
      font-size: 12px;
      color: #b89b72;
      text-transform: uppercase;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #ffd7a0;
    }

    .tap-area {
      display: flex;
      justify-content: center;
      margin: 20px 0 25px;
    }

    .coin-button {
      background: none;
      border: none;
      cursor: pointer;
      border-radius: 50%;
      transition: all 0.1s;
      filter: drop-shadow(0 0 20px #ff8c00);
    }

    .coin-button:active {
      transform: scale(0.9);
    }

    .coin-gfx {
      width: 180px;
      height: 180px;
      background: radial-gradient(circle at 30% 25%, #ffe4b5, #d4891a 70%, #7a4f0e);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px #ff8c00, inset 0 -5px 10px #00000080, inset 0 5px 10px #fff3cf;
      border: 3px solid #ffc864;
    }

    .coin-gfx span {
      font-size: 52px;
      font-weight: 900;
      color: #1a0f02;
      text-shadow: 2px 3px 0 #ffd58c;
    }

    .upgrade-card {
      background: #120e18;
      border: 1px solid #ff8c0060;
      border-radius: 30px;
      padding: 18px;
      margin-bottom: 15px;
    }

    .upgrade-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .upgrade-title {
      font-size: 18px;
      font-weight: 700;
      color: #ffc978;
    }

    .upgrade-cost {
      font-size: 20px;
      font-weight: 800;
      color: #ffaa00;
    }

    .upgrade-desc {
      color: #b8a58b;
      margin-bottom: 15px;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .level-badge {
      background: #2a1f12;
      padding: 4px 12px;
      border-radius: 30px;
      color: #ffc978;
      font-weight: 600;
    }

    .buy-btn {
      width: 100%;
      background: #2a1f12;
      border: 1px solid #ff8c00;
      color: #ffdca8;
      font-weight: 700;
      font-size: 16px;
      padding: 14px;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.15s;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .buy-btn:active {
      transform: translateY(2px);
    }

    .buy-btn.disabled {
      opacity: 0.3;
      pointer-events: none;
    }

    /* Рандомный фон */
    .random-bg-section {
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid #ff8c0030;
    }

    .random-bg-title {
      font-size: 18px;
      color: #ffc978;
      margin-bottom: 15px;
      text-align: center;
    }

    .random-bg-btn {
      width: 100%;
      background: linear-gradient(135deg, #8a2be2, #4a0080);
      border: 1px solid #ba7bff;
      color: #ffdca8;
      font-weight: 700;
      font-size: 16px;
      padding: 14px;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.15s;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .random-bg-btn:active {
      transform: translateY(2px);
    }

    .current-bg-info {
      text-align: center;
      color: #b89b72;
      font-size: 14px;
    }

    .status-message {
      text-align: center;
      margin-top: 15px;
      color: #eebb77;
      font-weight: 500;
      min-height: 24px;
    }

    .floating-number {
      position: fixed;
      font-weight: 900;
      color: #ffd28f;
      text-shadow: 0 0 20px #ff8c00, 0 2px 4px #000;
      font-size: 32px;
      pointer-events: none;
      z-index: 9999;
      animation: floatUp 0.8s ease-out forwards;
    }

    .floating-number.crit {
      color: #ff4444;
      text-shadow: 0 0 30px #ff0000, 0 2px 4px #000;
      font-size: 42px;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-100px); }
    }

    @media (max-width: 400px) {
      .coin-gfx { width: 150px; height: 150px; }
      .coin-gfx span { font-size: 42px; }
      .balance-value { font-size: 44px; }
    }
  </style>
</head>
<body class="bg-default">
<div class="game-container">
  <!-- Экран регистрации/входа -->
  <div id="registerScreen" class="register-screen">
    <div class="register-title">🚀 EnFT Tap</div>
    <div style="margin-bottom: 30px; color: #b89b72;" id="authTitle">Регистрация</div>
    <input type="text" id="usernameInput" class="register-input" placeholder="Твой ник" maxlength="20" autocomplete="off">
    <input type="password" id="passwordInput" class="register-input" placeholder="Пароль" maxlength="30" autocomplete="off">
    <button id="registerBtn" class="register-btn">ЗАРЕГИСТРИРОВАТЬСЯ</button>
    <div class="auth-toggle" id="toggleAuth">Уже есть аккаунт? Войти</div>
  </div>

  <!-- Основной экран игры -->
  <div id="mainScreen" class="main-screen">
    <div class="profile-section">
      <div class="profile-info">
        <div class="profile-avatar" id="profileAvatar">E</div>
        <span class="profile-name" id="profileName">Player</span>
      </div>
      <button class="logout-btn" id="logoutBtn">Выйти</button>
    </div>

    <div class="balance-section">
      <div class="balance-label">БАЛАНС EnFT</div>
      <div class="balance-value">
        <span id="balanceDisplay">0.0</span> ⚡
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-item">
        <div class="stat-label">СИЛА ТАПА</div>
        <div class="stat-value" id="tapPowerDisplay">1.0</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">КРИТ ШАНС</div>
        <div class="stat-value" id="critChanceDisplay">0%</div>
      </div>
    </div>

    <div class="tap-area">
      <button class="coin-button" id="tapButton">
        <div class="coin-gfx">
          <span>EnFT</span>
        </div>
      </button>
    </div>

    <!-- Улучшить удар (бесконечное) -->
    <div class="upgrade-card">
      <div class="upgrade-header">
        <span class="upgrade-title">💪 УЛУЧШИТЬ УДАР</span>
        <span class="upgrade-cost" id="punchCostDisplay">50</span>
      </div>
      <div class="upgrade-desc">
        <span>+0.5 EnFT за клик</span>
        <span class="level-badge" id="punchLevelDisplay">УР. 0</span>
      </div>
      <button class="buy-btn" id="buyPunchBtn">УЛУЧШИТЬ</button>
    </div>

    <!-- Критический удар (бесконечное) -->
    <div class="upgrade-card">
      <div class="upgrade-header">
        <span class="upgrade-title">🎯 КРИТИЧЕСКИЙ УДАР</span>
        <span class="upgrade-cost" id="critCostDisplay">100</span>
      </div>
      <div class="upgrade-desc">
        <span>+5% шанс x2 урона</span>
        <span class="level-badge" id="critLevelDisplay">УР. 0</span>
      </div>
      <button class="buy-btn" id="buyCritBtn">УЛУЧШИТЬ</button>
    </div>

    <!-- Рандомный фон -->
    <div class="random-bg-section">
      <div class="random-bg-title">🎲 РАНДОМНЫЙ ФОН</div>
      <button class="random-bg-btn" id="randomBgBtn">50 EnFT · СМЕНИТЬ ФОН</button>
      <div class="current-bg-info" id="currentBgName">Текущий: Стандарт</div>
    </div>

    <div id="messageArea" class="status-message"></div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- СОСТОЯНИЕ ИГРЫ ----------
    let currentUser = null;
    let isLoginMode = false; // false = регистрация, true = вход
    
    // Конфигурация улучшений
    const PUNCH_BASE_COST = 50;
    const PUNCH_COST_MULTIPLIER = 1.4;
    const PUNCH_BONUS = 0.5;
    
    const CRIT_BASE_COST = 100;
    const CRIT_COST_MULTIPLIER = 1.6;
    const CRIT_BONUS = 5; // +5% шанса за уровень
    
    const RANDOM_BG_COST = 50;
    
    // Доступные фоны
    const BACKGROUNDS = [
      { name: 'Стандарт', class: 'bg-default' },
      { name: 'Неон', class: 'bg-neon' },
      { name: 'Золото', class: 'bg-gold' },
      { name: 'Матрица', class: 'bg-matrix' },
      { name: 'Закат', class: 'bg-sunset' },
      { name: 'Океан', class: 'bg-ocean' }
    ];

    // UI элементы
    const registerScreen = document.getElementById('registerScreen');
    const mainScreen = document.getElementById('mainScreen');
    const usernameInput = document.getElementById('usernameInput');
    const passwordInput = document.getElementById('passwordInput');
    const registerBtn = document.getElementById('registerBtn');
    const toggleAuth = document.getElementById('toggleAuth');
    const authTitle = document.getElementById('authTitle');
    const logoutBtn = document.getElementById('logoutBtn');
    const profileAvatar = document.getElementById('profileAvatar');
    const profileName = document.getElementById('profileName');
    const balanceSpan = document.getElementById('balanceDisplay');
    const tapPowerSpan = document.getElementById('tapPowerDisplay');
    const critChanceDisplay = document.getElementById('critChanceDisplay');
    const punchCostSpan = document.getElementById('punchCostDisplay');
    const critCostSpan = document.getElementById('critCostDisplay');
    const punchLevelSpan = document.getElementById('punchLevelDisplay');
    const critLevelSpan = document.getElementById('critLevelDisplay');
    const currentBgName = document.getElementById('currentBgName');
    const messageDiv = document.getElementById('messageArea');
    
    const tapButton = document.getElementById('tapButton');
    const buyPunchBtn = document.getElementById('buyPunchBtn');
    const buyCritBtn = document.getElementById('buyCritBtn');
    const randomBgBtn = document.getElementById('randomBgBtn');

    // Вычисление силы тапа
    function getCurrentTapPower() {
      if (!currentUser) return 1.0;
      return 1.0 + (currentUser.punchLevel * PUNCH_BONUS);
    }

    // Вычисление шанса крита
    function getCritChance() {
      if (!currentUser) return 0;
      return Math.min(currentUser.critLevel * CRIT_BONUS, 100);
    }

    // Вычисление стоимости улучшения
    function getPunchCost() {
      if (!currentUser) return PUNCH_BASE_COST;
      return Math.floor(PUNCH_BASE_COST * Math.pow(PUNCH_COST_MULTIPLIER, currentUser.punchLevel));
    }

    function getCritCost() {
      if (!currentUser) return CRIT_BASE_COST;
      return Math.floor(CRIT_BASE_COST * Math.pow(CRIT_COST_MULTIPLIER, currentUser.critLevel));
    }

    // Всплывающие цифры
    function showFloatingNumber(x, y, amount, isCrit = false) {
      const floatEl = document.createElement('div');
      floatEl.className = isCrit ? 'floating-number crit' : 'floating-number';
      floatEl.textContent = `+${amount.toFixed(1)}${isCrit ? ' 💥' : ''}`;
      floatEl.style.left = (x - 20) + 'px';
      floatEl.style.top = (y - 30) + 'px';
      document.body.appendChild(floatEl);
      setTimeout(() => floatEl.remove(), 800);
    }

    // Применение фона
    function applyBackground(bgClass) {
      document.body.className = bgClass;
      const bg = BACKGROUNDS.find(b => b.class === bgClass);
      if (bg) {
        currentBgName.textContent = `Текущий: ${bg.name}`;
      }
    }

    // Обновление интерфейса
    function refreshUI() {
      if (!currentUser) return;
      
      const power = getCurrentTapPower();
      const critChance = getCritChance();
      
      balanceSpan.textContent = currentUser.balance.toFixed(1);
      tapPowerSpan.textContent = power.toFixed(1);
      critChanceDisplay.textContent = critChance + '%';
      
      // Улучшение удара
      const punchCost = getPunchCost();
      punchCostSpan.textContent = punchCost;
      punchLevelSpan.textContent = `УР. ${currentUser.punchLevel}`;
      
      if (currentUser.balance < punchCost) {
        buyPunchBtn.classList.add('disabled');
      } else {
        buyPunchBtn.classList.remove('disabled');
      }
      
      // Крит удар
      const critCost = getCritCost();
      critCostSpan.textContent = critCost;
      critLevelSpan.textContent = `УР. ${currentUser.critLevel}`;
      
      if (currentUser.balance < critCost) {
        buyCritBtn.classList.add('disabled');
      } else {
        buyCritBtn.classList.remove('disabled');
      }
      
      // Рандомный фон
      if (currentUser.balance < RANDOM_BG_COST) {
        randomBgBtn.classList.add('disabled');
      } else {
        randomBgBtn.classList.remove('disabled');
      }
      
      // Обновление профиля
      profileName.textContent = currentUser.name;
      profileAvatar.textContent = currentUser.name.charAt(0).toUpperCase();
      
      // Применяем текущий фон
      applyBackground(currentUser.currentBg);
    }

    // Сохранение всех пользователей
    function saveAllUsers(users) {
      localStorage.setItem('enft_all_users_v2', JSON.stringify(users));
    }

    function loadAllUsers() {
      const saved = localStorage.getItem('enft_all_users_v2');
      return saved ? JSON.parse(saved) : {};
    }

    // Сохранение текущего пользователя
    function saveCurrentUser() {
      if (!currentUser) return;
      const allUsers = loadAllUsers();
      allUsers[currentUser.name] = {
        ...currentUser,
        password: currentUser.password // сохраняем пароль
      };
      saveAllUsers(allUsers);
    }

    // Регистрация
    function register() {
      const name = usernameInput.value.trim();
      const password = passwordInput.value;
      
      if (!name || !password) {
        alert('Введи ник и пароль!');
        return false;
      }
      
      if (password.length < 3) {
        alert('Пароль должен быть минимум 3 символа!');
        return false;
      }
      
      const allUsers = loadAllUsers();
      
      if (isLoginMode) {
        // Вход
        if (!allUsers[name]) {
          alert('Пользователь не найден!');
          return false;
        }
        
        if (allUsers[name].password !== password) {
          alert('Неверный пароль!');
          return false;
        }
        
        currentUser = allUsers[name];
        messageDiv.textContent = `С возвращением, ${name}!`;
      } else {
        // Регистрация
        if (allUsers[name]) {
          alert('Пользователь уже существует!');
          return false;
        }
        
        currentUser = {
          name: name,
          password: password,
          balance: 0.0,
          punchLevel: 0,
          critLevel: 0,
          currentBg: 'bg-default'
        };
        
        allUsers[name] = currentUser;
        saveAllUsers(allUsers);
        messageDiv.textContent = `Добро пожаловать, ${name}!`;
      }
      
      registerScreen.style.display = 'none';
      mainScreen.style.display = 'block';
      refreshUI();
      return true;
    }

    // Выход
    function logout() {
      saveCurrentUser();
      currentUser = null;
      registerScreen.style.display = 'block';
      mainScreen.style.display = 'none';
      usernameInput.value = '';
      passwordInput.value = '';
      applyBackground('bg-default');
    }

    // Покупка улучшения удара
    function buyPunchUpgrade() {
      if (!currentUser) return;
      
      const cost = getPunchCost();
      if (currentUser.balance < cost) {
        messageDiv.textContent = '❌ Недостаточно EnFT';
        return;
      }
      
      currentUser.balance -= cost;
      currentUser.punchLevel++;
      
      messageDiv.textContent = `✅ Удар улучшен до ур. ${currentUser.punchLevel}! +${PUNCH_BONUS} к силе`;
      refreshUI();
      saveCurrentUser();
    }

    // Покупка крита
    function buyCritUpgrade() {
      if (!currentUser) return;
      
      const cost = getCritCost();
      if (currentUser.balance < cost) {
        messageDiv.textContent = '❌ Недостаточно EnFT';
        return;
      }
      
      if (getCritChance() >= 100) {
        messageDiv.textContent = '❌ Максимальный шанс крита (100%)';
        return;
      }
      
      currentUser.balance -= cost;
      currentUser.critLevel++;
      
      messageDiv.textContent = `🎯 Шанс крита увеличен до ${getCritChance()}%!`;
      refreshUI();
      saveCurrentUser();
    }

    // Рандомный фон
    function buyRandomBackground() {
      if (!currentUser) return;
      
      if (currentUser.balance < RANDOM_BG_COST) {
        messageDiv.textContent = '❌ Недостаточно EnFT (нужно 50)';
        return;
      }
      
      currentUser.balance -= RANDOM_BG_COST;
      
      // Выбираем случайный фон (кроме текущего для интереса)
      let availableBgs = BACKGROUNDS.filter(bg => bg.class !== currentUser.currentBg);
      if (availableBgs.length === 0) {
        availableBgs = BACKGROUNDS;
      }
      
      const randomBg = availableBgs[Math.floor(Math.random() * availableBgs.length)];
      currentUser.currentBg = randomBg.class;
      
      messageDiv.textContent = `🎲 Новый фон: ${randomBg.name}!`;
      refreshUI();
      saveCurrentUser();
    }

    // Тап
    function handleTap(event) {
      if (!currentUser) return;
      
      let earned = getCurrentTapPower();
      const isCrit = Math.random() * 100 < getCritChance();
      
      if (isCrit) {
        earned *= 2;
      }
      
      currentUser.balance += earned;
      
      let x = event.clientX || window.innerWidth / 2;
      let y = event.clientY || window.innerHeight / 2;
      showFloatingNumber(x, y, earned, isCrit);
      
      refreshUI();
      saveCurrentUser();
      
      if (isCrit) {
        messageDiv.textContent = `💥 КРИТ! +${earned.toFixed(1)} EnFT`;
      } else {
        messageDiv.textContent = `+${earned.toFixed(1)} EnFT`;
      }
    }

    // Переключение режима регистрация/вход
    function toggleAuthMode() {
      isLoginMode = !isLoginMode;
      if (isLoginMode) {
        authTitle.textContent = 'Вход в аккаунт';
        registerBtn.textContent = 'ВОЙТИ';
        toggleAuth.textContent = 'Нет аккаунта? Зарегистрироваться';
      } else {
        authTitle.textContent = 'Регистрация';
        registerBtn.textContent = 'ЗАРЕГИСТРИРОВАТЬСЯ';
        toggleAuth.textContent = 'Уже есть аккаунт? Войти';
      }
    }

    // Инициализация
    function init() {
      // Обработчики регистрации
      registerBtn.addEventListener('click', register);
      
      usernameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') register();
      });
      
      passwordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') register();
      });
      
      toggleAuth.addEventListener('click', toggleAuthMode);
      
      // Выход
      logoutBtn.addEventListener('click', logout);
      
      // Тап
      tapButton.addEventListener('click', handleTap);
      
      // Улучшения
      buyPunchBtn.addEventListener('click', buyPunchUpgrade);
      buyCritBtn.addEventListener('click', buyCritUpgrade);
      
      // Рандомный фон
      randomBgBtn.addEventListener('click', buyRandomBackground);
    }

    init();
  })();
</script>
</body>
</html>
