<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EnFT Tap · ОНЛАЙН</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Roboto:wght@400;700;900&family=Montserrat:wght@400;600;800&family=Play:wght@400;700&family=Press+Start+2P&family=Russo+One&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 20%, #1a1425, #030205);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      font-family: 'Inter', sans-serif;
      transition: background 0.3s;
    }
    body.bg-default { background: radial-gradient(circle at 30% 20%, #1a1425, #030205); }
    body.bg-neon { background: linear-gradient(135deg, #0a0a2e, #1a0a2e, #0a1a2e); }
    body.bg-gold { background: radial-gradient(circle at 70% 30%, #3a2a0a, #0a0a05); }
    body.bg-matrix { background: linear-gradient(0deg, #0a1a0a, #020302); }
    body.bg-sunset { background: linear-gradient(45deg, #2e0a0a, #2e1a0a, #1a0a2e); }
    body.bg-ocean { background: linear-gradient(180deg, #0a1a2e, #0a2e1a); }
    body.font-inter { font-family: 'Inter', sans-serif; }
    body.font-roboto { font-family: 'Roboto', sans-serif; }
    body.font-montserrat { font-family: 'Montserrat', sans-serif; }
    body.font-play { font-family: 'Play', sans-serif; }
    body.font-press-start { font-family: 'Press Start 2P', cursive; }
    body.font-russo { font-family: 'Russo One', sans-serif; }
    
    .game-container {
      max-width: 500px;
      width: 100%;
      background: rgba(8,6,12,0.9);
      backdrop-filter: blur(10px);
      border: 1px solid #ff8c00;
      border-radius: 40px;
      padding: 24px 20px 30px;
      box-shadow: 0 20px 40px #000, 0 0 20px #ff8c0040;
    }
    
    .auth-screen { text-align: center; padding: 20px 10px; }
    .auth-title { font-size: 28px; font-weight: 800; color: #ffd28f; text-shadow: 0 0 20px #ff8c00; margin-bottom: 10px; }
    .auth-subtitle { color: #b89b72; font-size: 14px; margin-bottom: 30px; }
    
    .password-wrapper { position: relative; margin-bottom: 15px; }
    .auth-input {
      width: 100%; padding: 16px 50px 16px 20px; background: #1a1425; border: 2px solid #ff8c00;
      border-radius: 50px; color: #ffdca8; font-size: 18px; outline: none; text-align: left;
    }
    .auth-input::placeholder { color: #8a7a5f; }
    .toggle-password {
      position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
      cursor: pointer; font-size: 20px; user-select: none; color: #b89b72; z-index: 10;
    }
    
    .auth-btn {
      width: 100%; padding: 16px; background: linear-gradient(135deg, #ff8c00, #ffaa33);
      border: none; border-radius: 50px; color: #0a0a0f; font-weight: 800;
      font-size: 18px; cursor: pointer; margin-top: 10px;
    }
    
    .main-screen { display: none; }
    .profile-section {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; padding: 10px 15px; background: #1a142580;
      border-radius: 50px; border: 1px solid #ff8c0050;
    }
    .profile-info { display: flex; align-items: center; gap: 10px; }
    .profile-avatar {
      width: 40px; height: 40px; background: linear-gradient(135deg, #ff8c00, #ffaa33);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 18px; color: #0a0a0f;
    }
    .profile-name { font-size: 16px; font-weight: 600; color: #ffdca8; }
    .logout-btn {
      background: none; border: 1px solid #ff8c0080; color: #b89b72;
      padding: 6px 15px; border-radius: 30px; font-size: 12px; cursor: pointer;
    }
    
    .balance-section { text-align: center; margin-bottom: 15px; }
    .balance-label { font-size: 14px; letter-spacing: 3px; color: #cc9f5f; text-transform: uppercase; }
    .balance-value { font-size: 56px; font-weight: 800; color: #ffd28f; text-shadow: 0 0 30px #ff8c00; }
    
    .stats-row {
      display: flex; justify-content: space-around; background: #1a1425;
      border-radius: 50px; padding: 12px; margin: 20px 0; border: 1px solid #ff8c0050;
    }
    .stat-item { text-align: center; }
    .stat-label { font-size: 12px; color: #b89b72; text-transform: uppercase; }
    .stat-value { font-size: 24px; font-weight: 700; color: #ffd7a0; }
    
    .tap-area { display: flex; justify-content: center; margin: 20px 0 25px; }
    .coin-button {
      background: none; border: none; cursor: pointer; border-radius: 50%;
      transition: all 0.1s; filter: drop-shadow(0 0 20px #ff8c00);
    }
    .coin-button:active { transform: scale(0.9); }
    .coin-gfx {
      width: 180px; height: 180px; background: radial-gradient(circle at 30% 25%, #ffe4b5, #d4891a 70%, #7a4f0e);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 40px #ff8c00, inset 0 -5px 10px #00000080, inset 0 5px 10px #fff3cf;
      border: 3px solid #ffc864;
    }
    .coin-gfx.crit {
      background: radial-gradient(circle at 30% 25%, #ff4444, #cc0000 70%, #660000) !important;
      box-shadow: 0 0 60px #ff0000, inset 0 -5px 10px #00000080 !important;
      border-color: #ff6666 !important;
    }
    .coin-gfx span { font-size: 52px; font-weight: 900; color: #1a0f02; text-shadow: 2px 3px 0 #ffd58c; }
    
    .upgrade-card {
      background: #120e18; border: 1px solid #ff8c0060; border-radius: 30px;
      padding: 18px; margin-bottom: 15px;
    }
    .upgrade-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
    .upgrade-title { font-size: 18px; font-weight: 700; color: #ffc978; }
    .upgrade-cost { font-size: 20px; font-weight: 800; color: #ffaa00; }
    .upgrade-desc {
      color: #b8a58b; margin-bottom: 15px; font-size: 14px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .level-badge {
      background: #2a1f12; padding: 4px 12px; border-radius: 30px;
      color: #ffc978; font-weight: 600;
    }
    .buy-btn {
      width: 100%; background: #2a1f12; border: 1px solid #ff8c00;
      color: #ffdca8; font-weight: 700; font-size: 16px; padding: 14px;
      border-radius: 50px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
    }
    .buy-btn:active { transform: translateY(2px); }
    .buy-btn.disabled { opacity: 0.3; pointer-events: none; }
    
    .daily-card {
      background: linear-gradient(135deg, #2a1f12, #1a1425); border: 1px solid #ffaa00;
      border-radius: 30px; padding: 20px; text-align: center; margin-bottom: 20px;
    }
    .daily-title { color: #ffc978; font-size: 18px; margin-bottom: 10px; }
    .daily-timer { color: #b89b72; font-size: 14px; margin-bottom: 15px; }
    .daily-btn {
      background: linear-gradient(135deg, #ff8c00, #ffaa33); border: none;
      border-radius: 50px; padding: 12px 30px; color: #0a0a0f; font-weight: 700;
      font-size: 16px; cursor: pointer;
    }
    .daily-btn.disabled { opacity: 0.3; pointer-events: none; }
    
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab {
      flex: 1; padding: 10px; background: #1a1425; border: 1px solid #ff8c0050;
      border-radius: 30px; color: #b89b72; font-size: 14px; cursor: pointer;
      text-align: center; transition: 0.2s;
    }
    .tab.active { background: #ff8c00; color: #0a0a0f; font-weight: 700; }
    .screen { display: none; }
    .screen.active { display: block; }
    
    .leaderboard-item {
      display: flex; justify-content: space-between; padding: 12px 15px;
      background: #120e18; border: 1px solid #ff8c0050; border-radius: 20px; margin-bottom: 8px;
    }
    .leaderboard-rank { color: #ffaa00; font-weight: 700; width: 50px; }
    .leaderboard-name { color: #ffdca8; flex: 1; }
    .leaderboard-balance { color: #00ff88; font-weight: 700; }
    .top-badge {
      background: linear-gradient(135deg, #ffd700, #ff8c00); color: #000;
      padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; margin-left: 5px;
    }
    
    .custom-section { margin-top: 20px; padding-top: 15px; border-top: 1px solid #ff8c0030; }
    .custom-title { font-size: 18px; color: #ffc978; margin-bottom: 15px; text-align: center; }
    .custom-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .custom-btn {
      background: linear-gradient(135deg, #8a2be2, #4a0080); border: 1px solid #ba7bff;
      color: #ffdca8; font-weight: 700; font-size: 14px; padding: 12px;
      border-radius: 50px; cursor: pointer; text-align: center;
    }
    .current-info { text-align: center; color: #b89b72; font-size: 14px; }
    
    .copyright {
      text-align: center; margin-top: 20px; padding-top: 15px;
      border-top: 1px solid #ff8c0030; color: #b89b72; font-size: 12px; opacity: 0.7;
    }
    
    .status-message { text-align: center; margin-top: 15px; color: #eebb77; min-height: 24px; }
    
    .floating-number {
      position: fixed; font-weight: 900; font-size: 32px; pointer-events: none;
      z-index: 9999; animation: floatUp 0.8s ease-out forwards;
      color: #ffd28f; text-shadow: 0 0 20px #ff8c00, 0 2px 4px #000;
    }
    .floating-number.crit {
      color: #ff4444 !important; text-shadow: 0 0 30px #ff0000, 0 2px 4px #000 !important;
      font-size: 42px;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-100px); }
    }
  </style>
</head>
<body class="bg-default font-inter">
<div class="game-container">
  
  <div id="authScreen" class="auth-screen">
    <div class="auth-title">🚀 EnFT Tap</div>
    <div class="auth-subtitle">Введи email и пароль</div>
    
    <input type="email" id="emailInput" class="auth-input" placeholder="Email" autocomplete="email" style="margin-bottom: 15px;">
    
    <div class="password-wrapper">
      <input type="password" id="passwordInput" class="auth-input" placeholder="Пароль" autocomplete="current-password">
      <span class="toggle-password" id="togglePassword">👁️</span>
    </div>
    
    <button id="authBtn" class="auth-btn">ВОЙТИ / РЕГИСТРАЦИЯ</button>
    <div id="authMessage" style="color: #ff6b6b; font-size: 12px; margin-top: 10px;"></div>
  </div>
  
  <div id="mainScreen" class="main-screen">
    <div class="profile-section">
      <div class="profile-info">
        <div class="profile-avatar" id="profileAvatar">E</div>
        <span class="profile-name" id="profileName">Player</span>
      </div>
      <button class="logout-btn" id="logoutBtn">Выйти</button>
    </div>
    
    <div class="tabs">
      <div class="tab active" data-tab="game">Игра</div>
      <div class="tab" data-tab="leaderboard">Топ</div>
    </div>
    
    <div id="gameScreen" class="screen active">
      <div class="balance-section">
        <div class="balance-label">БАЛАНС EnFT</div>
        <div class="balance-value"><span id="balanceDisplay">0.0</span> ⚡</div>
      </div>
      
      <div class="daily-card">
        <div class="daily-title">🎁 ЕЖЕДНЕВНЫЙ БОНУС</div>
        <div class="daily-timer" id="dailyTimer">Загрузка...</div>
        <button class="daily-btn" id="dailyBonusBtn">ЗАБРАТЬ</button>
      </div>
      
      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-label">СИЛА ТАПА</div>
          <div class="stat-value" id="tapPowerDisplay">1.0</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">КРИТ ШАНС</div>
          <div class="stat-value" id="critChanceDisplay">0%</div>
        </div>
      </div>
      
      <div class="tap-area">
        <button class="coin-button" id="tapButton">
          <div class="coin-gfx" id="coinGfx"><span>EnFT</span></div>
        </button>
      </div>
      
      <div class="upgrade-card">
        <div class="upgrade-header">
          <span class="upgrade-title">💪 УЛУЧШИТЬ УДАР</span>
          <span class="upgrade-cost" id="punchCostDisplay">50</span>
        </div>
        <div class="upgrade-desc">
          <span>+0.5 EnFT за клик</span>
          <span class="level-badge" id="punchLevelDisplay">УР. 0</span>
        </div>
        <button class="buy-btn" id="buyPunchBtn">УЛУЧШИТЬ</button>
      </div>
      
      <div class="upgrade-card">
        <div class="upgrade-header">
          <span class="upgrade-title">🎯 КРИТИЧЕСКИЙ ШАНС</span>
          <span class="upgrade-cost" id="critCostDisplay">100</span>
        </div>
        <div class="upgrade-desc">
          <span>+2% шанс крита (макс 50%)</span>
          <span class="level-badge" id="critLevelDisplay">УР. 0</span>
        </div>
        <button class="buy-btn" id="buyCritBtn">УЛУЧШИТЬ</button>
      </div>
      
      <div class="custom-section">
        <div class="custom-title">🎨 КАСТОМИЗАЦИЯ</div>
        <div class="custom-buttons">
          <button class="custom-btn" id="randomBgBtn">🎲 ФОН (50)</button>
          <button class="custom-btn" id="randomFontBtn">🔤 ШРИФТ (30)</button>
        </div>
        <div class="current-info">
          <span id="currentBgName">Стандарт</span> · <span id="currentFontName">Inter</span>
        </div>
      </div>
      
      <div id="messageArea" class="status-message"></div>
    </div>
    
    <div id="leaderboardScreen" class="screen">
      <div id="leaderboardList"></div>
    </div>
    
    <div class="copyright">Enight — Машенькин Евгений креатор</div>
  </div>
</div>

<script>
  // КОНФИГ SUPABASE
  const SUPABASE_URL = 'https://hmrziifyekqmbnpzusjg.supabase.co'
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhtcnppaWZ5ZWtxbWJucHp1c2pnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDUyMjg4MDAsImV4cCI6MjA2MDgwNDgwMH0.sb_publishable_x_cxT_vRQczSb_AgX80-0g_3a5-rs0CjF9'
  
  // Проверяем ключ
  console.log('🔑 Подключение к Supabase...')
  
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  
  let currentUser = null
  const PUNCH_BASE = 50, PUNCH_MULT = 1.4, PUNCH_BONUS = 0.5
  const CRIT_BASE = 100, CRIT_MULT = 1.5, CRIT_BONUS = 2, MAX_CRIT = 50
  const BG_COST = 50, FONT_COST = 30
  const BG_LIST = ['bg-default', 'bg-neon', 'bg-gold', 'bg-matrix', 'bg-sunset', 'bg-ocean']
  const BG_NAMES = ['Стандарт', 'Неон', 'Золото', 'Матрица', 'Закат', 'Океан']
  const FONT_LIST = ['font-inter', 'font-roboto', 'font-montserrat', 'font-play', 'font-press-start', 'font-russo']
  const FONT_NAMES = ['Inter', 'Roboto', 'Montserrat', 'Play', 'Press Start', 'Russo One']
  
  // UI
  const authScreen = document.getElementById('authScreen')
  const mainScreen = document.getElementById('mainScreen')
  const emailInput = document.getElementById('emailInput')
  const passwordInput = document.getElementById('passwordInput')
  const authBtn = document.getElementById('authBtn')
  const authMessage = document.getElementById('authMessage')
  const togglePassword = document.getElementById('togglePassword')
  const logoutBtn = document.getElementById('logoutBtn')
  const profileName = document.getElementById('profileName')
  const profileAvatar = document.getElementById('profileAvatar')
  const balanceSpan = document.getElementById('balanceDisplay')
  const tapPowerSpan = document.getElementById('tapPowerDisplay')
  const critChanceSpan = document.getElementById('critChanceDisplay')
  const punchCostSpan = document.getElementById('punchCostDisplay')
  const critCostSpan = document.getElementById('critCostDisplay')
  const punchLevelSpan = document.getElementById('punchLevelDisplay')
  const critLevelSpan = document.getElementById('critLevelDisplay')
  const dailyTimer = document.getElementById('dailyTimer')
  const dailyBtn = document.getElementById('dailyBonusBtn')
  const messageDiv = document.getElementById('messageArea')
  const coinGfx = document.getElementById('coinGfx')
  const currentBgName = document.getElementById('currentBgName')
  const currentFontName = document.getElementById('currentFontName')
  
  // Глазик
  togglePassword.addEventListener('click', function() {
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text'
      this.textContent = '🔒'
    } else {
      passwordInput.type = 'password'
      this.textContent = '👁️'
    }
  })
  
  // Вкладки
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'))
      tab.classList.add('active')
      document.getElementById(tab.dataset.tab + 'Screen').classList.add('active')
      if (tab.dataset.tab === 'leaderboard') updateLeaderboard()
    })
  })
  
  function getTapPower() {
    return 1.0 + (currentUser?.punch_level || 0) * PUNCH_BONUS
  }
  
  function getCritChance() {
    return Math.min((currentUser?.crit_level || 0) * CRIT_BONUS, MAX_CRIT)
  }
  
  function getPunchCost() {
    return Math.floor(PUNCH_BASE * Math.pow(PUNCH_MULT, currentUser?.punch_level || 0))
  }
  
  function getCritCost() {
    return Math.floor(CRIT_BASE * Math.pow(CRIT_MULT, currentUser?.crit_level || 0))
  }
  
  async function getLeaderboard() {
    const { data, error } = await supabase.from('players').select('email,balance').order('balance', { ascending: false }).limit(10)
    if (error) console.error('Ошибка загрузки топа:', error)
    return data || []
  }
  
  async function updateLeaderboard() {
    const data = await getLeaderboard()
    const list = document.getElementById('leaderboardList')
    list.innerHTML = data.map((p, i) => {
      const rank = i + 1
      const badge = rank <= 5 ? '<span class="top-badge">x3</span>' : rank <= 10 ? '<span class="top-badge">x2</span>' : ''
      return `<div class="leaderboard-item">
        <span class="leaderboard-rank">#${rank}</span>
        <span class="leaderboard-name">${p.email.split('@')[0]} ${badge}</span>
        <span class="leaderboard-balance">${(p.balance || 0).toFixed(1)} ⚡</span>
      </div>`
    }).join('')
  }
  
  async function refreshUI() {
    if (!currentUser) return
    
    balanceSpan.textContent = (currentUser.balance || 0).toFixed(1)
    tapPowerSpan.textContent = getTapPower().toFixed(1)
    critChanceSpan.textContent = getCritChance() + '%'
    
    const punchCost = getPunchCost()
    punchCostSpan.textContent = punchCost
    punchLevelSpan.textContent = `УР. ${currentUser.punch_level || 0}`
    document.getElementById('buyPunchBtn').classList.toggle('disabled', currentUser.balance < punchCost)
    
    const critCost = getCritCost()
    critCostSpan.textContent = critCost
    critLevelSpan.textContent = `УР. ${currentUser.crit_level || 0}`
    document.getElementById('buyCritBtn').classList.toggle('disabled', currentUser.balance < critCost || getCritChance() >= MAX_CRIT)
    
    profileName.textContent = currentUser.email.split('@')[0]
    profileAvatar.textContent = currentUser.email[0].toUpperCase()
    
    document.body.className = `${currentUser.current_bg || 'bg-default'} ${currentUser.current_font || 'font-inter'}`
    currentBgName.textContent = BG_NAMES[BG_LIST.indexOf(currentUser.current_bg)] || 'Стандарт'
    currentFontName.textContent = FONT_NAMES[FONT_LIST.indexOf(currentUser.current_font)] || 'Inter'
    
    await updateDailyBonus()
  }
  
  async function updateDailyBonus() {
    const now = Date.now()
    const last = currentUser.last_daily ? new Date(currentUser.last_daily).getTime() : 0
    const left = last + 86400000 - now
    
    const lb = await getLeaderboard()
    const rank = lb.findIndex(p => p.email === currentUser.email) + 1
    let bonus = 50
    if (rank <= 5) bonus = 150
    else if (rank <= 10) bonus = 100
    
    const multiplier = rank <= 5 ? ' (ТОП-5 x3!)' : rank <= 10 ? ' (ТОП-10 x2!)' : ''
    
    if (left <= 0) {
      dailyTimer.textContent = `+${bonus} EnFT доступно!${multiplier}`
      dailyBtn.classList.remove('disabled')
    } else {
      const h = Math.floor(left / 3600000)
      const m = Math.floor((left % 3600000) / 60000)
      dailyTimer.textContent = `Через ${h}ч ${m}м (бонус: ${bonus}${multiplier})`
      dailyBtn.classList.add('disabled')
    }
  }
  
  async function claimDaily() {
    const now = new Date().toISOString()
    const last = currentUser.last_daily ? new Date(currentUser.last_daily).getTime() : 0
    if (Date.now() - last < 86400000) return
    
    const lb = await getLeaderboard()
    const rank = lb.findIndex(p => p.email === currentUser.email) + 1
    let bonus = 50
    if (rank <= 5) bonus = 150
    else if (rank <= 10) bonus = 100
    
    currentUser.balance += bonus
    currentUser.last_daily = now
    
    const { error } = await supabase.from('players').update({ balance: currentUser.balance, last_daily: now }).eq('email', currentUser.email)
    if (error) console.error('Ошибка бонуса:', error)
    
    messageDiv.textContent = `🎁 Получено ${bonus} EnFT!`
    refreshUI()
  }
  
  async function loginOrRegister() {
    const email = emailInput.value.trim().toLowerCase()
    const password = passwordInput.value
    
    if (!email.includes('@') || !email.includes('.')) {
      authMessage.textContent = 'Введи корректный email'
      return
    }
    
    if (password.length < 6) {
      authMessage.textContent = 'Пароль минимум 6 символов'
      return
    }
    
    authMessage.textContent = 'Загрузка...'
    
    const { data, error } = await supabase.from('players').select('*').eq('email', email).maybeSingle()
    
    if (error) {
      authMessage.textContent = 'Ошибка сервера: ' + error.message
      console.error(error)
      return
    }
    
    if (data) {
      if (data.password !== password) {
        authMessage.textContent = 'Неверный пароль'
        return
      }
      currentUser = data
      authMessage.textContent = ''
    } else {
      currentUser = {
        email, password,
        balance: 0, punch_level: 0, crit_level: 0,
        total_taps: 0, total_crits: 0, bg_purchases: 0,
        current_bg: 'bg-default', current_font: 'font-inter',
        last_daily: null
      }
      const { error: insertError } = await supabase.from('players').insert(currentUser)
      if (insertError) {
        authMessage.textContent = 'Ошибка регистрации: ' + insertError.message
        console.error(insertError)
        return
      }
      authMessage.textContent = ''
    }
    
    localStorage.setItem('enft_email', email)
    authScreen.style.display = 'none'
    mainScreen.style.display = 'block'
    refreshUI()
  }
  
  async function handleTap(e) {
    if (!currentUser) return
    
    currentUser.total_taps = (currentUser.total_taps || 0) + 1
    let earned = getTapPower()
    const isCrit = Math.random() * 100 < getCritChance()
    
    if (isCrit) {
      earned *= 2
      currentUser.total_crits = (currentUser.total_crits || 0) + 1
      coinGfx.classList.add('crit')
      setTimeout(() => coinGfx.classList.remove('crit'), 100)
    }
    
    currentUser.balance += earned
    
    const float = document.createElement('div')
    float.className = `floating-number${isCrit ? ' crit' : ''}`
    float.textContent = `+${earned.toFixed(1)}${isCrit ? ' 💥' : ''}`
    float.style.left = (e.clientX - 20) + 'px'
    float.style.top = (e.clientY - 30) + 'px'
    document.body.appendChild(float)
    setTimeout(() => float.remove(), 800)
    
    await supabase.from('players').update({
      balance: currentUser.balance,
      total_taps: currentUser.total_taps,
      total_crits: currentUser.total_crits
    }).eq('email', currentUser.email)
    
    refreshUI()
    messageDiv.textContent = isCrit ? `💥 КРИТ! +${earned.toFixed(1)}` : `+${earned.toFixed(1)}`
  }
  
  async function buyPunch() {
    const cost = getPunchCost()
    if (currentUser.balance < cost) return
    currentUser.balance -= cost
    currentUser.punch_level++
    await supabase.from('players').update({ balance: currentUser.balance, punch_level: currentUser.punch_level }).eq('email', currentUser.email)
    refreshUI()
    messageDiv.textContent = `✅ Удар улучшен до ур. ${currentUser.punch_level}!`
  }
  
  async function buyCrit() {
    if (getCritChance() >= MAX_CRIT) return
    const cost = getCritCost()
    if (currentUser.balance < cost) return
    currentUser.balance -= cost
    currentUser.crit_level++
    await supabase.from('players').update({ balance: currentUser.balance, crit_level: currentUser.crit_level }).eq('email', currentUser.email)
    refreshUI()
    messageDiv.textContent = `🎯 Шанс крита: ${getCritChance()}%`
  }
  
  async function randomBg() {
    if (currentUser.balance < BG_COST) return
    currentUser.balance -= BG_COST
    currentUser.bg_purchases = (currentUser.bg_purchases || 0) + 1
    const available = BG_LIST.filter(b => b !== currentUser.current_bg)
    currentUser.current_bg = available[Math.floor(Math.random() * available.length)]
    await supabase.from('players').update({ balance: currentUser.balance, bg_purchases: currentUser.bg_purchases, current_bg: currentUser.current_bg }).eq('email', currentUser.email)
    refreshUI()
  }
  
  async function randomFont() {
    if (currentUser.balance < FONT_COST) return
    currentUser.balance -= FONT_COST
    const available = FONT_LIST.filter(f => f !== currentUser.current_font)
    currentUser.current_font = available[Math.floor(Math.random() * available.length)]
    await supabase.from('players').update({ balance: currentUser.balance, current_font: currentUser.current_font }).eq('email', currentUser.email)
    refreshUI()
  }
