<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EnFT Tap · Хардкорный мемкоин</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      background-image: radial-gradient(circle at 30% 20%, #1a1425 0%, #030205 100%);
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      transition: background-image 0.3s ease;
    }

    /* Фоны */
    body.bg-default { background-image: radial-gradient(circle at 30% 20%, #1a1425 0%, #030205 100%); }
    body.bg-neon { background-image: linear-gradient(135deg, #0a0a2e 0%, #1a0a2e 50%, #0a1a2e 100%); }
    body.bg-gold { background-image: radial-gradient(circle at 70% 30%, #3a2a0a 0%, #0a0a05 100%); }
    body.bg-matrix { background-image: linear-gradient(0deg, #0a1a0a 0%, #020302 100%); }
    body.bg-sunset { background-image: linear-gradient(45deg, #2e0a0a 0%, #2e1a0a 50%, #1a0a2e 100%); }
    body.bg-ocean { background-image: linear-gradient(180deg, #0a1a2e 0%, #0a2e1a 100%); }

    .game-container {
      max-width: 500px;
      width: 100%;
      background: rgba(8, 6, 12, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid #ff8c00;
      border-radius: 40px;
      padding: 24px 20px 30px;
      box-shadow: 0 20px 40px #000, 0 0 20px #ff8c0040;
    }

    /* Вкладки */
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      background: #1a1425;
      border: 1px solid #ff8c0050;
      border-radius: 30px;
      color: #b89b72;
      font-size: 14px;
      cursor: pointer;
      text-align: center;
      transition: 0.2s;
    }

    .tab.active {
      background: #ff8c00;
      color: #0a0a0f;
      font-weight: 700;
    }

    /* Экраны */
    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    /* Профиль */
    .profile-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding: 10px 15px;
      background: #1a142580;
      border-radius: 50px;
      border: 1px solid #ff8c0050;
    }

    .profile-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .profile-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #ff8c00, #ffaa33);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 18px;
      color: #0a0a0f;
    }

    .profile-name {
      font-size: 16px;
      font-weight: 600;
      color: #ffdca8;
    }

    .logout-btn {
      background: none;
      border: 1px solid #ff8c0080;
      color: #b89b72;
      padding: 6px 15px;
      border-radius: 30px;
      font-size: 12px;
      cursor: pointer;
    }

    /* Баланс */
    .balance-section {
      text-align: center;
      margin-bottom: 15px;
    }

    .balance-label {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 3px;
      color: #cc9f5f;
      text-transform: uppercase;
    }

    .balance-value {
      font-size: 56px;
      font-weight: 800;
      color: #ffd28f;
      text-shadow: 0 0 30px #ff8c00;
      line-height: 1.2;
    }

    /* Статы */
    .stats-row {
      display: flex;
      justify-content: space-around;
      background: #1a1425;
      border-radius: 50px;
      padding: 12px;
      margin: 20px 0;
      border: 1px solid #ff8c0050;
    }

    .stat-item {
      text-align: center;
    }

    .stat-label {
      font-size: 12px;
      color: #b89b72;
      text-transform: uppercase;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #ffd7a0;
    }

    /* Кнопка тапа */
    .tap-area {
      display: flex;
      justify-content: center;
      margin: 20px 0 25px;
    }

    .coin-button {
      background: none;
      border: none;
      cursor: pointer;
      border-radius: 50%;
      transition: all 0.1s;
      filter: drop-shadow(0 0 20px #ff8c00);
    }

    .coin-button:active {
      transform: scale(0.9);
    }

    .coin-gfx {
      width: 180px;
      height: 180px;
      background: radial-gradient(circle at 30% 25%, #ffe4b5, #d4891a 70%, #7a4f0e);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px #ff8c00, inset 0 -5px 10px #00000080, inset 0 5px 10px #fff3cf;
      border: 3px solid #ffc864;
      transition: all 0.1s;
    }

    .coin-gfx.crit {
      background: radial-gradient(circle at 30% 25%, #ff4444, #cc0000 70%, #660000);
      box-shadow: 0 0 60px #ff0000, inset 0 -5px 10px #00000080;
      border-color: #ff6666;
    }

    .coin-gfx span {
      font-size: 52px;
      font-weight: 900;
      color: #1a0f02;
      text-shadow: 2px 3px 0 #ffd58c;
    }

    /* Карточки апгрейдов */
    .upgrade-card {
      background: #120e18;
      border: 1px solid #ff8c0060;
      border-radius: 30px;
      padding: 18px;
      margin-bottom: 15px;
    }

    .upgrade-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .upgrade-title {
      font-size: 18px;
      font-weight: 700;
      color: #ffc978;
    }

    .upgrade-cost {
      font-size: 20px;
      font-weight: 800;
      color: #ffaa00;
    }

    .upgrade-desc {
      color: #b8a58b;
      margin-bottom: 15px;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .level-badge {
      background: #2a1f12;
      padding: 4px 12px;
      border-radius: 30px;
      color: #ffc978;
      font-weight: 600;
    }

    .buy-btn {
      width: 100%;
      background: #2a1f12;
      border: 1px solid #ff8c00;
      color: #ffdca8;
      font-weight: 700;
      font-size: 16px;
      padding: 14px;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.15s;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .buy-btn:active {
      transform: translateY(2px);
    }

    .buy-btn.disabled {
      opacity: 0.3;
      pointer-events: none;
    }

    /* Достижения */
    .achievement-card {
      background: #120e18;
      border: 1px solid #ff8c0060;
      border-radius: 20px;
      padding: 15px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .achievement-info {
      flex: 1;
    }

    .achievement-name {
      color: #ffc978;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .achievement-desc {
      color: #b8a58b;
      font-size: 12px;
    }

    .achievement-status {
      color: #00ff88;
      font-size: 20px;
    }

    .achievement-locked {
      color: #6a5a47;
    }

    /* Таблица лидеров */
    .leaderboard-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 15px;
      background: #120e18;
      border: 1px solid #ff8c0050;
      border-radius: 20px;
      margin-bottom: 8px;
    }

    .leaderboard-rank {
      color: #ffaa00;
      font-weight: 700;
      width: 30px;
    }

    .leaderboard-name {
      color: #ffdca8;
      flex: 1;
    }

    .leaderboard-balance {
      color: #00ff88;
      font-weight: 700;
    }

    /* Ежедневный бонус */
    .daily-bonus-card {
      background: linear-gradient(135deg, #2a1f12, #1a1425);
      border: 1px solid #ffaa00;
      border-radius: 30px;
      padding: 20px;
      text-align: center;
      margin-bottom: 20px;
    }

    .daily-title {
      color: #ffc978;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .daily-timer {
      color: #b89b72;
      font-size: 14px;
      margin-bottom: 15px;
    }

    .daily-btn {
      background: linear-gradient(135deg, #ff8c00, #ffaa33);
      border: none;
      border-radius: 50px;
      padding: 12px 30px;
      color: #0a0a0f;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
    }

    .daily-btn.disabled {
      opacity: 0.3;
      pointer-events: none;
    }

    /* Рандомный фон */
    .random-bg-section {
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid #ff8c0030;
    }

    .random-bg-title {
      font-size: 18px;
      color: #ffc978;
      margin-bottom: 15px;
      text-align: center;
    }

    .random-bg-btn {
      width: 100%;
      background: linear-gradient(135deg, #8a2be2, #4a0080);
      border: 1px solid #ba7bff;
      color: #ffdca8;
      font-weight: 700;
      font-size: 16px;
      padding: 14px;
      border-radius: 50px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .current-bg-info {
      text-align: center;
      color: #b89b72;
      font-size: 14px;
    }

    .status-message {
      text-align: center;
      margin-top: 15px;
      color: #eebb77;
      font-weight: 500;
      min-height: 24px;
    }

    /* Всплывающие цифры */
    .floating-number {
      position: fixed;
      font-weight: 900;
      color: #ffd28f;
      text-shadow: 0 0 20px #ff8c00, 0 2px 4px #000;
      font-size: 32px;
      pointer-events: none;
      z-index: 9999;
      animation: floatUp 0.8s ease-out forwards;
    }

    .floating-number.crit {
      color: #ff4444;
      text-shadow: 0 0 30px #ff0000, 0 2px 4px #000;
      font-size: 42px;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-100px); }
    }

    /* Регистрация */
    .register-screen {
      text-align: center;
      padding: 20px 10px;
    }

    .register-title {
      font-size: 28px;
      font-weight: 800;
      color: #ffd28f;
      text-shadow: 0 0 20px #ff8c00;
      margin-bottom: 30px;
    }

    .register-input {
      width: 100%;
      padding: 16px 20px;
      background: #1a1425;
      border: 2px solid #ff8c00;
      border-radius: 50px;
      color: #ffdca8;
      font-size: 18px;
      outline: none;
      margin-bottom: 15px;
      text-align: center;
    }

    .register-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #ff8c00, #ffaa33);
      border: none;
      border-radius: 50px;
      color: #0a0a0f;
      font-weight: 800;
      font-size: 18px;
      cursor: pointer;
      margin-top: 10px;
    }

    @media (max-width: 400px) {
      .coin-gfx { width: 150px; height: 150px; }
      .coin-gfx span { font-size: 42px; }
      .balance-value { font-size: 44px; }
    }
  </style>
</head>
<body class="bg-default">
<div class="game-container">
  <!-- Экран регистрации -->
  <div id="registerScreen" class="register-screen">
    <div class="register-title">🚀 EnFT Tap</div>
    <input type="text" id="usernameInput" class="register-input" placeholder="Твой ник" maxlength="20">
    <input type="password" id="passwordInput" class="register-input" placeholder="Пароль" maxlength="30">
    <button id="registerBtn" class="register-btn">ВОЙТИ / РЕГИСТРАЦИЯ</button>
  </div>

  <!-- Основной экран -->
  <div id="mainScreen" style="display: none;">
    <div class="profile-section">
      <div class="profile-info">
        <div class="profile-avatar" id="profileAvatar">E</div>
        <span class="profile-name" id="profileName">Player</span>
      </div>
      <button class="logout-btn" id="logoutBtn">Выйти</button>
    </div>

    <!-- Вкладки -->
    <div class="tabs">
      <div class="tab active" data-tab="game">Игра</div>
      <div class="tab" data-tab="achievements">Достижения</div>
      <div class="tab" data-tab="leaderboard">Топ</div>
    </div>

    <!-- Вкладка Игра -->
    <div id="gameScreen" class="screen active">
      <div class="balance-section">
        <div class="balance-label">БАЛАНС EnFT</div>
        <div class="balance-value">
          <span id="balanceDisplay">0.0</span> ⚡
        </div>
      </div>

      <!-- Ежедневный бонус -->
      <div class="daily-bonus-card" id="dailyBonusCard">
        <div class="daily-title">🎁 ЕЖЕДНЕВНЫЙ БОНУС</div>
        <div class="daily-timer" id="dailyTimer">+50 EnFT доступно!</div>
        <button class="daily-btn" id="dailyBonusBtn">ЗАБРАТЬ</button>
      </div>

      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-label">СИЛА ТАПА</div>
          <div class="stat-value" id="tapPowerDisplay">1.0</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">КРИТ ШАНС</div>
          <div class="stat-value" id="critChanceDisplay">0%</div>
        </div>
      </div>

      <div class="tap-area">
        <button class="coin-button" id="tapButton">
          <div class="coin-gfx" id="coinGfx">
            <span>EnFT</span>
          </div>
        </button>
      </div>

      <!-- Улучшения -->
      <div class="upgrade-card">
        <div class="upgrade-header">
          <span class="upgrade-title">💪 УЛУЧШИТЬ УДАР</span>
          <span class="upgrade-cost" id="punchCostDisplay">50</span>
        </div>
        <div class="upgrade-desc">
          <span>+0.5 EnFT за клик</span>
          <span class="level-badge" id="punchLevelDisplay">УР. 0</span>
        </div>
        <button class="buy-btn" id="buyPunchBtn">УЛУЧШИТЬ</button>
      </div>

      <div class="upgrade-card">
        <div class="upgrade-header">
          <span class="upgrade-title">🎯 КРИТИЧЕСКИЙ ШАНС</span>
          <span class="upgrade-cost" id="critCostDisplay">100</span>
        </div>
        <div class="upgrade-desc">
          <span>+2% шанс крита (макс 50%)</span>
          <span class="level-badge" id="critLevelDisplay">УР. 0</span>
        </div>
        <button class="buy-btn" id="buyCritBtn">УЛУЧШИТЬ</button>
      </div>

      <!-- Рандомный фон -->
      <div class="random-bg-section">
        <div class="random-bg-title">🎲 РАНДОМНЫЙ ФОН</div>
        <button class="random-bg-btn" id="randomBgBtn">50 EnFT · СМЕНИТЬ ФОН</button>
        <div class="current-bg-info" id="currentBgName">Текущий: Стандарт</div>
      </div>

      <div id="messageArea" class="status-message"></div>
    </div>

    <!-- Вкладка Достижения -->
    <div id="achievementsScreen" class="screen">
      <div id="achievementsList"></div>
    </div>

    <!-- Вкладка Таблица лидеров -->
    <div id="leaderboardScreen" class="screen">
      <div id="leaderboardList"></div>
    </div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- ЗВУКИ ----------
    const sounds = {
      tap: new Audio('data:audio/wav;base64,UklGRlwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YVoAAACAgYGBgYCAgICAgICAf39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f38='),
      crit: new Audio('data:audio/wav;base64,UklGRlwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YVoAAACAgYGBgYCAgICAgICAf39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f38='),
      buy: new Audio('data:audio/wav;base64,UklGRlwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YVoAAACAgYGBgYCAgICAgICAf39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f38=')
    };
    
    let soundsEnabled = false;
    
    function enableSounds() {
      soundsEnabled = true;
    }
    
    function playSound(soundName) {
      if (!soundsEnabled) return;
      const sound = sounds[soundName];
      if (sound) {
        sound.currentTime = 0;
        sound.play().catch(() => {});
      }
    }

    // ---------- СОСТОЯНИЕ ----------
    let currentUser = null;
    
    const PUNCH_BASE_COST = 50;
    const PUNCH_COST_MULTIPLIER = 1.4;
    const PUNCH_BONUS = 0.5;
    
    const CRIT_BASE_COST = 100;
    const CRIT_COST_MULTIPLIER = 1.5;
    const CRIT_BONUS = 2;
    const MAX_CRIT = 50;
    
    const RANDOM_BG_COST = 50;
    
    const BACKGROUNDS = [
      { name: 'Стандарт', class: 'bg-default' },
      { name: 'Неон', class: 'bg-neon' },
      { name: 'Золото', class: 'bg-gold' },
      { name: 'Матрица', class: 'bg-matrix' },
      { name: 'Закат', class: 'bg-sunset' },
      { name: 'Океан', class: 'bg-ocean' }
    ];

    // Достижения
    const ACHIEVEMENTS = [
      { id: 'taps_100', name: 'Новичок', desc: '100 тапов', reward: 10, check: (u) => u.totalTaps >= 100 },
      { id: 'taps_1000', name: 'Тапер', desc: '1000 тапов', reward: 50, check: (u) => u.totalTaps >= 1000 },
      { id: 'crit_10', name: 'Критик', desc: '10 критов', reward: 30, check: (u) => u.totalCrits >= 10 },
      { id: 'bg_5', name: 'Дизайнер', desc: '5 фонов', reward: 100, check: (u) => u.bgPurchases >= 5 },
      { id: 'balance_500', name: 'Богач', desc: '500 EnFT', reward: 0, check: (u) => u.balance >= 500 }
    ];

    // UI элементы
    const registerScreen = document.getElementById('registerScreen');
    const mainScreen = document.getElementById('mainScreen');
    const usernameInput = document.getElementById('usernameInput');
    const passwordInput = document.getElementById('passwordInput');
    const registerBtn = document.getElementById('registerBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const profileAvatar = document.getElementById('profileAvatar');
    const profileName = document.getElementById('profileName');
    const balanceSpan = document.getElementById('balanceDisplay');
    const tapPowerSpan = document.getElementById('tapPowerDisplay');
    const critChanceDisplay = document.getElementById('critChanceDisplay');
    const punchCostSpan = document.getElementById('punchCostDisplay');
    const critCostSpan = document.getElementById('critCostDisplay');
    const punchLevelSpan = document.getElementById('punchLevelDisplay');
    const critLevelSpan = document.getElementById('critLevelDisplay');
    const currentBgName = document.getElementById('currentBgName');
    const messageDiv = document.getElementById('messageArea');
    const coinGfx = document.getElementById('coinGfx');
    
    const tapButton = document.getElementById('tapButton');
    const buyPunchBtn = document.getElementById('buyPunchBtn');
    const buyCritBtn = document.getElementById('buyCritBtn');
    const randomBgBtn = document.getElementById('randomBgBtn');
    const dailyBonusBtn = document.getElementById('dailyBonusBtn');
    const dailyTimer = document.getElementById('dailyTimer');

    // Вкладки
    const tabs = document.querySelectorAll('.tab');
    const screens = {
      game: document.getElementById('gameScreen'),
      achievements: document.getElementById('achievementsScreen'),
      leaderboard: document.getElementById('leaderboardScreen')
    };

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const tabName = tab.dataset.tab;
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        Object.values(screens).forEach(s => s.classList.remove('active'));
        screens[tabName].classList.add('active');
        if (tabName === 'achievements') updateAchievementsList();
        if (tabName === 'leaderboard') updateLeaderboard();
      });
    });

    // Функции
    function getTapPower() {
      if (!currentUser) return 1.0;
      return 1.0 + (currentUser.punchLevel * PUNCH_BONUS);
    }

    function getCritChance() {
      if (!currentUser) return 0;
      return Math.min(currentUser.critLevel * CRIT_BONUS, MAX_CRIT);
    }

    function getPunchCost() {
      return Math.floor(PUNCH_BASE_COST * Math.pow(PUNCH_COST_MULTIPLIER, currentUser.punchLevel));
    }

    function getCritCost() {
      return Math.floor(CRIT_BASE_COST * Math.pow(CRIT_COST_MULTIPLIER, currentUser.critLevel));
    }

    function showFloatingNumber(x, y, amount, isCrit = false) {
      const floatEl = document.createElement('div');
      floatEl.className = isCrit ? 'floating-number crit' : 'floating-number';
      floatEl.textContent = `+${amount.toFixed(1)}${isCrit ? ' 💥' : ''}`;
      floatEl.style.left = (x - 20) + 'px';
      floatEl.style.top = (y - 30) + 'px';
      document.body.appendChild(floatEl);
      setTimeout(() => floatEl.remove(), 800);
    }

    function applyBackground(bgClass) {
      document.body.className = bgClass;
      const bg = BACKGROUNDS.find(b => b.class === bgClass);
      if (bg) currentBgName.textContent = `Текущий: ${bg.name}`;
    }

    function saveAllUsers(users) {
      localStorage.setItem('enft_users_v3', JSON.stringify(users));
    }

    function loadAllUsers() {
      return JSON.parse(localStorage.getItem('enft_users_v3') || '{}');
    }

    function saveCurrentUser() {
      if (!currentUser) return;
      const users = loadAllUsers();
      users[currentUser.name] = currentUser;
      saveAllUsers(users);
    }

    function refreshUI() {
      if (!currentUser) return;
      
      const power = getTapPower();
      const critChance = getCritChance();
      
      balanceSpan.textContent = currentUser.balance.toFixed(1);
      tapPowerSpan.textContent = power.toFixed(1);
      critChanceDisplay.textContent = critChance + '%';
      
      const punchCost = getPunchCost();
      punchCostSpan.textContent = punchCost;
      punchLevelSpan.textContent = `УР. ${currentUser.punchLevel}`;
      buyPunchBtn.classList.toggle('disabled', currentUser.balance < punchCost);
      
      const critCost = getCritCost();
      critCostSpan.textContent = critCost;
      critLevelSpan.textContent = `УР. ${currentUser.critLevel}`;
      buyCritBtn.classList.toggle('disabled', currentUser.balance < critCost || critChance >= MAX_CRIT);
      
      randomBgBtn.classList.toggle('disabled', currentUser.balance < RANDOM_BG_COST);
      
      profileName.textContent = currentUser.name;
      profileAvatar.textContent = currentUser.name.charAt(0).toUpperCase();
      
      applyBackground(currentUser.currentBg || 'bg-default');
      
      // Ежедневный бонус
      updateDailyBonus();
    }

    function updateDailyBonus() {
      if (!currentUser) return;
      
      const now = Date.now();
      const lastClaim = currentUser.lastDailyClaim || 0;
      const cooldown = 24 * 60 * 60 * 1000;
      const timeLeft = lastClaim + cooldown - now;
      
      if (timeLeft <= 0) {
        dailyTimer.textContent = '+50 EnFT доступно!';
        dailyBonusBtn.classList.remove('disabled');
      } else {
        const hours = Math.floor(timeLeft / (60 * 60 * 1000));
        const minutes = Math.floor((timeLeft % (60 * 60 * 1000)) / (60 * 1000));
        dailyTimer.textContent = `Доступно через ${hours}ч ${minutes}м`;
        dailyBonusBtn.classList.add('disabled');
      }
    }

    function claimDailyBonus() {
      if (!currentUser) return;
      
      const now = Date.now();
      const lastClaim = currentUser.lastDailyClaim || 0;
      const cooldown = 24 * 60 * 60 * 1000;
      
      if (now - lastClaim < cooldown) return;
      
      currentUser.balance += 50;
      currentUser.lastDailyClaim = now;
      
      messageDiv.textContent = '🎁 Получено 50 EnFT!';
      playSound('buy');
      refreshUI();
      saveCurrentUser();
    }

    function updateAchievementsList() {
      if (!currentUser) return;
      
      const list = document.getElementById('achievementsList');
      list.innerHTML = '';
      
      ACHIEVEMENTS.forEach(ach => {
        const completed = currentUser.achievements?.includes(ach.id) || ach.check(currentUser);
        const card = document.createElement('div');
        card.className = 'achievement-card';
        card.innerHTML = `
          <div class="achievement-info">
            <div class="achievement-name">${ach.name}</div>
            <div class="achievement-desc">${ach.desc} · +${ach.reward} EnFT</div>
          </div>
          <div class="achievement-status ${completed ? '' : 'achievement-locked'}">
            ${completed ? '✓' : '🔒'}
          </div>
        `;
        list.appendChild(card);
      });
    }

    function checkAchievements() {
      if (!currentUser) return;
      
      if (!currentUser.achievements) currentUser.achievements = [];
      
      ACHIEVEMENTS.forEach(ach => {
        if (!currentUser.achievements.includes(ach.id) && ach.check(currentUser)) {
          currentUser.achievements.push(ach.id);
          currentUser.balance += ach.reward;
          messageDiv.textContent = `🏆 Достижение: ${ach.name}! +${ach.reward} EnFT`;
          playSound('buy');
        }
      });
      
      saveCurrentUser();
    }

    function updateLeaderboard() {
      const users = loadAllUsers();
      const sorted = Object.values(users).sort((a, b) => b.balance - a.balance).slice(0, 5);
      
      const list = document.getElementById('leaderboardList');
      list.innerHTML = '';
      
      sorted.forEach((user, i) => {
        const item = document.createElement('div');
        item.className = 'leaderboard-item';
        item.innerHTML = `
          <span class="leaderboard-rank">#${i + 1}</span>
          <span class="leaderboard-name">${user.name}</span>
          <span class="leaderboard-balance">${user.balance.toFixed(1)} ⚡</span>
        `;
        list.appendChild(item);
      });
    }

    function register() {
      const name = usernameInput.value.trim();
      const password = passwordInput.value;
      
      if (!name || !password) {
        alert('Введи ник и пароль!');
        return;
      }
      
      const users = loadAllUsers();
      
      if (users[name]) {
        if (users[name].password !== password) {
          alert('Неверный пароль!');
          return;
        }
        currentUser = users[name];
      } else {
        currentUser = {
          name,
          password,
          balance: 0.0,
          punchLevel: 0,
          critLevel: 0,
          currentBg: 'bg-default',
          totalTaps: 0,
          totalCrits: 0,
          bgPurchases: 0,
          achievements: [],
          lastDailyClaim: 0
        };
        users[name] = currentUser;
        saveAllUsers(users);
      }
      
      // Инициализация
      if (!currentUser.totalTaps) currentUser.totalTaps = 0;
      if (!currentUser.totalCrits) currentUser.totalCrits = 0;
      if (!currentUser.bgPurchases) currentUser.bgPurchases = 0;
      if (!currentUser.achievements) currentUser.achievements = [];
      
      registerScreen.style.display = 'none';
      mainScreen.style.display = 'block';
      refreshUI();
      checkAchievements();
      enableSounds();
      playSound('buy');
    }

    function logout() {
      saveCurrentUser();
      currentUser = null;
      registerScreen.style.display = 'block';
      mainScreen.style.display = 'none';
      usernameInput.value = '';
      passwordInput.value = '';
      document.body.className = 'bg-default';
    }

    function buyPunch() {
      if (!currentUser) return;
      const cost = getPunchCost();
      if (currentUser.balance < cost) return;
      
      currentUser.balance -= cost;
      currentUser.punchLevel++;
      
      playSound('buy');
      messageDiv.textContent = `✅ Удар улучшен до ур. ${currentUser.punchLevel}!`;
      refreshUI();
      checkAchievements();
      saveCurrentUser();
    }

    function buyCrit() {
      if (!currentUser) return;
      if (getCritChance() >= MAX_CRIT) return;
      
      const cost = getCritCost();
      if (currentUser.balance < cost) return;
      
      currentUser.balance -= cost;
      currentUser.critLevel++;
      
      playSound('buy');
      messageDiv.textContent = `🎯 Шанс крита: ${getCritChance()}%`;
      refreshUI();
      checkAchievements();
      saveCurrentUser();
    }

    function buyRandomBg() {
      if (!currentUser) return;
      if (currentUser.balance < RANDOM_BG_COST) return;
      
      currentUser.balance -= RANDOM_BG_COST;
      currentUser.bgPurchases = (currentUser.bgPurchases || 0) + 1;
      
      const available = BACKGROUNDS.filter(bg => bg.class !== currentUser.currentBg);
      const randomBg = available[Math.floor(Math.random() * available.length)];
      currentUser.currentBg = randomBg.class;
      
      playSound('buy');
      messageDiv.textContent = `🎲 Новый фон: ${randomBg.name}!`;
      refreshUI();
      checkAchievements();
      saveCurrentUser();
    }

    function handleTap(event) {
      if (!currentUser) return;
      
      currentUser.totalTaps = (currentUser.totalTaps || 0) + 1;
      
      let earned = getTapPower();
      const isCrit = Math.random() * 100 < getCritChance();
      
      if (isCrit) {
        earned *= 2;
        currentUser.totalCrits = (currentUser.totalCrits || 0) + 1;
        coinGfx.classList.add('crit');
        setTimeout(() => coinGfx.classList.remove('crit'), 100);
        playSound('crit');
      } else {
        playSound('tap');
      }
      
      currentUser.balance += earned;
      
      const x = event.clientX || window.innerWidth / 2;
      const y = event.clientY || window.innerHeight / 2;
      showFloatingNumber(x, y, earned, isCrit);
      
      refreshUI();
      checkAchievements();
      saveCurrentUser();
      
      messageDiv.textContent = isCrit ? `💥 КРИТ! +${earned.toFixed(1)}` : `+${earned.toFixed(1)}`;
    }

    // Инициализация
    registerBtn.addEventListener('click', register);
    logoutBtn.addEventListener('click', logout);
    tapButton.addEventListener('click', handleTap);
    buyPunchBtn.addEventListener('click', buyPunch);
    buyCritBtn.addEventListener('click', buyCrit);
    randomBgBtn.addEventListener('click', buyRandomBg);
    dailyBonusBtn.addEventListener('click', claimDailyBonus);
    
    usernameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') register(); });
    passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') register(); });
    
    // Таймер ежедневного бонуса
    setInterval(() => {
      if (currentUser) updateDailyBonus();
    }, 1000);
  })();
</script>
</body>
</html>
