<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EnFT Tap · Хардкорный мемкоин</title>
  
  <!-- Подключаем шрифты -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Roboto:wght@400;700;900&family=Montserrat:wght@400;600;800&family=Play:wght@400;700&family=Press+Start+2P&family=Russo+One&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      background-image: radial-gradient(circle at 30% 20%, #1a1425 0%, #030205 100%);
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      transition: background-image 0.3s ease;
      font-family: 'Inter', sans-serif;
      position: relative;
    }

    /* Неоновая рамка body */
    body::before {
      content: '';
      position: fixed;
      top: 10px;
      left: 10px;
      right: 10px;
      bottom: 10px;
      border: 2px solid #ff8c00;
      border-radius: 50px;
      pointer-events: none;
      box-shadow: 0 0 30px #ff8c00, inset 0 0 30px #ff8c0040;
      transition: all 0.3s ease;
      z-index: 1;
    }

    /* Фоны */
    body.bg-default { background-image: radial-gradient(circle at 30% 20%, #1a1425 0%, #030205 100%); }
    body.bg-default::before { border-color: #ff8c00; box-shadow: 0 0 30px #ff8c00, inset 0 0 30px #ff8c0040; }
    
    body.bg-neon { background-image: linear-gradient(135deg, #0a0a2e 0%, #1a0a2e 50%, #0a1a2e 100%); }
    body.bg-neon::before { border-color: #00ffff; box-shadow: 0 0 30px #00ffff, inset 0 0 30px #00ffff40; }
    
    body.bg-gold { background-image: radial-gradient(circle at 70% 30%, #3a2a0a 0%, #0a0a05 100%); }
    body.bg-gold::before { border-color: #ffd700; box-shadow: 0 0 30px #ffd700, inset 0 0 30px #ffd70040; }
    
    body.bg-matrix { background-image: linear-gradient(0deg, #0a1a0a 0%, #020302 100%); }
    body.bg-matrix::before { border-color: #00ff00; box-shadow: 0 0 30px #00ff00, inset 0 0 30px #00ff0040; }
    
    body.bg-sunset { background-image: linear-gradient(45deg, #2e0a0a 0%, #2e1a0a 50%, #1a0a2e 100%); }
    body.bg-sunset::before { border-color: #ff4500; box-shadow: 0 0 30px #ff4500, inset 0 0 30px #ff450040; }
    
    body.bg-ocean { background-image: linear-gradient(180deg, #0a1a2e 0%, #0a2e1a 100%); }
    body.bg-ocean::before { border-color: #1e90ff; box-shadow: 0 0 30px #1e90ff, inset 0 0 30px #1e90ff40; }

    /* Шрифты */
    body.font-inter { font-family: 'Inter', sans-serif; }
    body.font-roboto { font-family: 'Roboto', sans-serif; }
    body.font-montserrat { font-family: 'Montserrat', sans-serif; }
    body.font-play { font-family: 'Play', sans-serif; }
    body.font-press-start { font-family: 'Press Start 2P', cursive; }
    body.font-russo { font-family: 'Russo One', sans-serif; }

    .game-container {
      max-width: 500px;
      width: 100%;
      background: rgba(8, 6, 12, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid;
      border-radius: 40px;
      padding: 24px 20px 30px;
      box-shadow: 0 20px 40px #000;
      transition: all 0.3s ease;
      position: relative;
      z-index: 2;
    }

    body.bg-default .game-container { border-color: #ff8c00; box-shadow: 0 20px 40px #000, 0 0 20px #ff8c0040; }
    body.bg-neon .game-container { border-color: #00ffff; box-shadow: 0 20px 40px #000, 0 0 20px #00ffff40; }
    body.bg-gold .game-container { border-color: #ffd700; box-shadow: 0 20px 40px #000, 0 0 20px #ffd70040; }
    body.bg-matrix .game-container { border-color: #00ff00; box-shadow: 0 20px 40px #000, 0 0 20px #00ff0040; }
    body.bg-sunset .game-container { border-color: #ff4500; box-shadow: 0 20px 40px #000, 0 0 20px #ff450040; }
    body.bg-ocean .game-container { border-color: #1e90ff; box-shadow: 0 20px 40px #000, 0 0 20px #1e90ff40; }

    /* Вкладки */
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      background: #1a1425;
      border: 1px solid;
      border-radius: 30px;
      color: #b89b72;
      font-size: 14px;
      cursor: pointer;
      text-align: center;
      transition: 0.2s;
    }

    body.bg-default .tab { border-color: #ff8c0050; }
    body.bg-neon .tab { border-color: #00ffff50; color: #88ffff; }
    body.bg-gold .tab { border-color: #ffd70050; color: #ffdca8; }
    body.bg-matrix .tab { border-color: #00ff0050; color: #88ff88; }
    body.bg-sunset .tab { border-color: #ff450050; color: #ffaa88; }
    body.bg-ocean .tab { border-color: #1e90ff50; color: #88ccff; }

    .tab.active {
      background: #ff8c00;
      color: #0a0a0f;
      font-weight: 700;
    }

    body.bg-neon .tab.active { background: #00ffff; }
    body.bg-gold .tab.active { background: #ffd700; }
    body.bg-matrix .tab.active { background: #00ff00; }
    body.bg-sunset .tab.active { background: #ff4500; }
    body.bg-ocean .tab.active { background: #1e90ff; }

    /* Экраны */
    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    /* Профиль */
    .profile-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding: 10px 15px;
      background: #1a142580;
      border-radius: 50px;
      border: 1px solid;
    }

    body.bg-default .profile-section { border-color: #ff8c0050; }
    body.bg-neon .profile-section { border-color: #00ffff50; }
    body.bg-gold .profile-section { border-color: #ffd70050; }
    body.bg-matrix .profile-section { border-color: #00ff0050; }
    body.bg-sunset .profile-section { border-color: #ff450050; }
    body.bg-ocean .profile-section { border-color: #1e90ff50; }

    .profile-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .profile-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #ff8c00, #ffaa33);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 18px;
      color: #0a0a0f;
    }

    body.bg-neon .profile-avatar { background: linear-gradient(135deg, #00ffff, #00cccc); }
    body.bg-gold .profile-avatar { background: linear-gradient(135deg, #ffd700, #ffaa00); }
    body.bg-matrix .profile-avatar { background: linear-gradient(135deg, #00ff00, #00cc00); }
    body.bg-sunset .profile-avatar { background: linear-gradient(135deg, #ff4500, #cc3300); }
    body.bg-ocean .profile-avatar { background: linear-gradient(135deg, #1e90ff, #0066cc); }

    .profile-name {
      font-size: 16px;
      font-weight: 600;
      color: #ffdca8;
    }

    body.bg-neon .profile-name { color: #aaffff; }
    body.bg-gold .profile-name { color: #ffeaa8; }
    body.bg-matrix .profile-name { color: #aaffaa; }
    body.bg-sunset .profile-name { color: #ffccaa; }
    body.bg-ocean .profile-name { color: #aaccff; }

    .logout-btn {
      background: none;
      border: 1px solid;
      padding: 6px 15px;
      border-radius: 30px;
      font-size: 12px;
      cursor: pointer;
    }

    body.bg-default .logout-btn { border-color: #ff8c0080; color: #b89b72; }
    body.bg-neon .logout-btn { border-color: #00ffff80; color: #88aaaa; }
    body.bg-gold .logout-btn { border-color: #ffd70080; color: #ccaa66; }
    body.bg-matrix .logout-btn { border-color: #00ff0080; color: #88aa88; }
    body.bg-sunset .logout-btn { border-color: #ff450080; color: #cc8877; }
    body.bg-ocean .logout-btn { border-color: #1e90ff80; color: #8899cc; }

    /* Баланс */
    .balance-section {
      text-align: center;
      margin-bottom: 15px;
    }

    .balance-label {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    body.bg-default .balance-label { color: #cc9f5f; }
    body.bg-neon .balance-label { color: #88cccc; }
    body.bg-gold .balance-label { color: #ddbb66; }
    body.bg-matrix .balance-label { color: #88cc88; }
    body.bg-sunset .balance-label { color: #cc9988; }
    body.bg-ocean .balance-label { color: #8899dd; }

    .balance-value {
      font-size: 56px;
      font-weight: 800;
      line-height: 1.2;
    }

    body.bg-default .balance-value { color: #ffd28f; text-shadow: 0 0 30px #ff8c00; }
    body.bg-neon .balance-value { color: #aaffff; text-shadow: 0 0 30px #00ffff; }
    body.bg-gold .balance-value { color: #ffeeaa; text-shadow: 0 0 30px #ffd700; }
    body.bg-matrix .balance-value { color: #aaffaa; text-shadow: 0 0 30px #00ff00; }
    body.bg-sunset .balance-value { color: #ffccbb; text-shadow: 0 0 30px #ff4500; }
    body.bg-ocean .balance-value { color: #bbddff; text-shadow: 0 0 30px #1e90ff; }

    /* Статы */
    .stats-row {
      display: flex;
      justify-content: space-around;
      background: #1a1425;
      border-radius: 50px;
      padding: 12px;
      margin: 20px 0;
      border: 1px solid;
    }

    body.bg-default .stats-row { border-color: #ff8c0050; }
    body.bg-neon .stats-row { border-color: #00ffff50; }
    body.bg-gold .stats-row { border-color: #ffd70050; }
    body.bg-matrix .stats-row { border-color: #00ff0050; }
    body.bg-sunset .stats-row { border-color: #ff450050; }
    body.bg-ocean .stats-row { border-color: #1e90ff50; }

    .stat-item {
      text-align: center;
    }

    .stat-label {
      font-size: 12px;
      text-transform: uppercase;
    }

    body.bg-default .stat-label { color: #b89b72; }
    body.bg-neon .stat-label { color: #88bbbb; }
    body.bg-gold .stat-label { color: #ccaa77; }
    body.bg-matrix .stat-label { color: #88bb88; }
    body.bg-sunset .stat-label { color: #bb9988; }
    body.bg-ocean .stat-label { color: #88aacc; }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
    }

    body.bg-default .stat-value { color: #ffd7a0; }
    body.bg-neon .stat-value { color: #aaffff; }
    body.bg-gold .stat-value { color: #ffdd99; }
    body.bg-matrix .stat-value { color: #aaffaa; }
    body.bg-sunset .stat-value { color: #ffbbaa; }
    body.bg-ocean .stat-value { color: #aaccff; }

    /* Кнопка тапа */
    .tap-area {
      display: flex;
      justify-content: center;
      margin: 20px 0 25px;
    }

    .coin-button {
      background: none;
      border: none;
      cursor: pointer;
      border-radius: 50%;
      transition: all 0.1s;
    }

    body.bg-default .coin-button { filter: drop-shadow(0 0 20px #ff8c00); }
    body.bg-neon .coin-button { filter: drop-shadow(0 0 20px #00ffff); }
    body.bg-gold .coin-button { filter: drop-shadow(0 0 20px #ffd700); }
    body.bg-matrix .coin-button { filter: drop-shadow(0 0 20px #00ff00); }
    body.bg-sunset .coin-button { filter: drop-shadow(0 0 20px #ff4500); }
    body.bg-ocean .coin-button { filter: drop-shadow(0 0 20px #1e90ff); }

    .coin-button:active {
      transform: scale(0.9);
    }

    .coin-gfx {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid;
      transition: all 0.1s;
    }

    body.bg-default .coin-gfx { 
      background: radial-gradient(circle at 30% 25%, #ffe4b5, #d4891a 70%, #7a4f0e);
      border-color: #ffc864;
      box-shadow: 0 0 40px #ff8c00, inset 0 -5px 10px #00000080, inset 0 5px 10px #fff3cf;
    }

    body.bg-neon .coin-gfx { 
      background: radial-gradient(circle at 30% 25%, #aaffff, #00aaaa 70%, #005555);
      border-color: #88ffff;
      box-shadow: 0 0 40px #00ffff, inset 0 -5px 10px #00000080, inset 0 5px 10px #aaffff;
    }

    body.bg-gold .coin-gfx { 
      background: radial-gradient(circle at 30% 25%, #ffffaa, #cc9900 70%, #664d00);
      border-color: #ffdd88;
      box-shadow: 0 0 40px #ffd700, inset 0 -5px 10px #00000080, inset 0 5px 10px #ffffaa;
    }

    body.bg-matrix .coin-gfx { 
      background: radial-gradient(circle at 30% 25%, #aaffaa, #00aa00 70%, #005500);
      border-color: #88ff88;
      box-shadow: 0 0 40px #00ff00, inset 0 -5px 10px #00000080, inset 0 5px 10px #aaffaa;
    }

    body.bg-sunset .coin-gfx { 
      background: radial-gradient(circle at 30% 25%, #ffccbb, #cc4400 70%, #662200);
      border-color: #ff9988;
      box-shadow: 0 0 40px #ff4500, inset 0 -5px 10px #00000080, inset 0 5px 10px #ffccbb;
    }

    body.bg-ocean .coin-gfx { 
      background: radial-gradient(circle at 30% 25%, #bbddff, #0066cc 70%, #003366);
      border-color: #88bbff;
      box-shadow: 0 0 40px #1e90ff, inset 0 -5px 10px #00000080, inset 0 5px 10px #bbddff;
    }

    .coin-gfx.crit {
      background: radial-gradient(circle at 30% 25%, #ff4444, #cc0000 70%, #660000) !important;
      box-shadow: 0 0 60px #ff0000, inset 0 -5px 10px #00000080 !important;
      border-color: #ff6666 !important;
    }

    .coin-gfx span {
      font-size: 52px;
      font-weight: 900;
      color: #1a0f02;
      text-shadow: 2px 3px 0 #ffd58c;
    }

    /* Карточки апгрейдов */
    .upgrade-card {
      background: #120e18;
      border: 1px solid;
      border-radius: 30px;
      padding: 18px;
      margin-bottom: 15px;
    }

    body.bg-default .upgrade-card { border-color: #ff8c0060; }
    body.bg-neon .upgrade-card { border-color: #00ffff60; }
    body.bg-gold .upgrade-card { border-color: #ffd70060; }
    body.bg-matrix .upgrade-card { border-color: #00ff0060; }
    body.bg-sunset .upgrade-card { border-color: #ff450060; }
    body.bg-ocean .upgrade-card { border-color: #1e90ff60; }

    .upgrade-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .upgrade-title {
      font-size: 18px;
      font-weight: 700;
    }

    body.bg-default .upgrade-title { color: #ffc978; }
    body.bg-neon .upgrade-title { color: #aaffff; }
    body.bg-gold .upgrade-title { color: #ffdd88; }
    body.bg-matrix .upgrade-title { color: #aaffaa; }
    body.bg-sunset .upgrade-title { color: #ffbb99; }
    body.bg-ocean .upgrade-title { color: #aaccff; }

    .upgrade-cost {
      font-size: 20px;
      font-weight: 800;
      color: #ffaa00;
    }

    body.bg-neon .upgrade-cost { color: #00ffff; }
    body.bg-gold .upgrade-cost { color: #ffd700; }
    body.bg-matrix .upgrade-cost { color: #00ff00; }
    body.bg-sunset .upgrade-cost { color: #ff4500; }
    body.bg-ocean .upgrade-cost { color: #1e90ff; }

    .upgrade-desc {
      margin-bottom: 15px;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    body.bg-default .upgrade-desc { color: #b8a58b; }
    body.bg-neon .upgrade-desc { color: #88bbbb; }
    body.bg-gold .upgrade-desc { color: #ccbb99; }
    body.bg-matrix .upgrade-desc { color: #88bb88; }
    body.bg-sunset .upgrade-desc { color: #bbaa99; }
    body.bg-ocean .upgrade-desc { color: #99aacc; }

    .level-badge {
      background: #2a1f12;
      padding: 4px 12px;
      border-radius: 30px;
      font-weight: 600;
    }

    body.bg-default .level-badge { color: #ffc978; }
    body.bg-neon .level-badge { color: #aaffff; }
    body.bg-gold .level-badge { color: #ffdd88; }
    body.bg-matrix .level-badge { color: #aaffaa; }
    body.bg-sunset .level-badge { color: #ffbb99; }
    body.bg-ocean .level-badge { color: #aaccff; }

    .buy-btn {
      width: 100%;
      background: #2a1f12;
      border: 1px solid;
      font-weight: 700;
      font-size: 16px;
      padding: 14px;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.15s;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    body.bg-default .buy-btn { border-color: #ff8c00; color: #ffdca8; }
    body.bg-neon .buy-btn { border-color: #00ffff; color: #aaffff; }
    body.bg-gold .buy-btn { border-color: #ffd700; color: #ffdd88; }
    body.bg-matrix .buy-btn { border-color: #00ff00; color: #aaffaa; }
    body.bg-sunset .buy-btn { border-color: #ff4500; color: #ffbb99; }
    body.bg-ocean .buy-btn { border-color: #1e90ff; color: #aaccff; }

    .buy-btn:active {
      transform: translateY(2px);
    }

    .buy-btn.disabled {
      opacity: 0.3;
      pointer-events: none;
    }

    /* Рандомный фон и шрифт */
    .customization-section {
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid;
    }

    body.bg-default .customization-section { border-color: #ff8c0030; }
    body.bg-neon .customization-section { border-color: #00ffff30; }
    body.bg-gold .customization-section { border-color: #ffd70030; }
    body.bg-matrix .customization-section { border-color: #00ff0030; }
    body.bg-sunset .customization-section { border-color: #ff450030; }
    body.bg-ocean .customization-section { border-color: #1e90ff30; }

    .customization-title {
      font-size: 18px;
      margin-bottom: 15px;
      text-align: center;
    }

    body.bg-default .customization-title { color: #ffc978; }
    body.bg-neon .customization-title { color: #aaffff; }
    body.bg-gold .customization-title { color: #ffdd88; }
    body.bg-matrix .customization-title { color: #aaffaa; }
    body.bg-sunset .customization-title { color: #ffbb99; }
    body.bg-ocean .customization-title { color: #aaccff; }

    .customization-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .custom-btn {
      background: linear-gradient(135deg, #8a2be2, #4a0080);
      border: 1px solid #ba7bff;
      color: #ffdca8;
      font-weight: 700;
      font-size: 14px;
      padding: 12px;
      border-radius: 50px;
      cursor: pointer;
      text-align: center;
    }

    .current-info {
      text-align: center;
      font-size: 14px;
    }

    body.bg-default .current-info { color: #b89b72; }
    body.bg-neon .current-info { color: #88bbbb; }
    body.bg-gold .current-info { color: #ccbb99; }
    body.bg-matrix .current-info { color: #88bb88; }
    body.bg-sunset .current-info { color: #bbaa99; }
    body.bg-ocean .current-info { color: #99aacc; }

    /* Копирайт */
    .copyright {
      text-align: center;
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid;
      font-size: 12px;
      opacity: 0.7;
    }

    body.bg-default .copyright { border-color: #ff8c0030; color: #b89b72; }
    body.bg-neon .copyright { border-color: #00ffff30; color: #88bbbb; }
    body.bg-gold .copyright { border-color: #ffd70030; color: #ccbb99; }
    body.bg-matrix .copyright { border-color: #00ff0030; color: #88bb88; }
    body.bg-sunset .copyright { border-color: #ff450030; color: #bbaa99; }
    body.bg-ocean .copyright { border-color: #1e90ff30; color: #99aacc; }

    /* Регистрация */
    .register-screen {
      text-align: center;
      padding: 20px 10px;
    }

    .register-title {
      font-size: 28px;
      font-weight: 800;
      color: #ffd28f;
      text-shadow: 0 0 20px #ff8c00;
      margin-bottom: 30px;
    }

    .password-wrapper {
      position: relative;
      margin-bottom: 15px;
    }

    .register-input {
      width: 100%;
      padding: 16px 50px 16px 20px;
      background: #1a1425;
      border: 2px solid #ff8c00;
      border-radius: 50px;
      color: #ffdca8;
      font-size: 18px;
      outline: none;
      text-align: center;
    }

    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 20px;
      color: #b89b72;
      user-select: none;
    }

    .register-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #ff8c00, #ffaa33);
      border: none;
      border-radius: 50px;
      color: #0a0a0f;
      font-weight: 800;
      font-size: 18px;
      cursor: pointer;
      margin-top: 10px;
    }

    /* Адаптив */
    @media (max-width: 400px) {
      .coin-gfx { width: 150px; height: 150px; }
      .coin-gfx span { font-size: 42px; }
      .balance-value { font-size: 44px; }
    }

    /* Всплывашки */
    .floating-number {
      position: fixed;
      font-weight: 900;
      font-size: 32px;
      pointer-events: none;
