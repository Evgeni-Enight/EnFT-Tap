<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EnFT · Серьезный мемкоин</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      background-image: radial-gradient(circle at 30% 20%, #1a1425 0%, #030205 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .game-container {
      max-width: 450px;
      width: 100%;
      background: rgba(8, 6, 12, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid #ff8c00;
      border-radius: 40px;
      padding: 24px 20px 30px;
      box-shadow: 0 20px 40px #000, 0 0 20px #ff8c0040;
    }

    .balance-section {
      text-align: center;
      margin-bottom: 20px;
    }

    .balance-label {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 3px;
      color: #cc9f5f;
    }

    .balance-value {
      font-size: 64px;
      font-weight: 800;
      color: #ffd28f;
      text-shadow: 0 0 30px #ff8c00;
      line-height: 1.2;
    }

    .stats-row {
      display: flex;
      justify-content: space-around;
      background: #1a1425;
      border-radius: 50px;
      padding: 12px;
      margin: 20px 0;
      border: 1px solid #ff8c0050;
    }

    .stat-item {
      text-align: center;
    }

    .stat-label {
      font-size: 12px;
      color: #b89b72;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: #ffd7a0;
    }

    .tap-area {
      display: flex;
      justify-content: center;
      margin: 20px 0 25px;
    }

    .coin-button {
      background: none;
      border: none;
      cursor: pointer;
      border-radius: 50%;
      transition: all 0.1s;
      filter: drop-shadow(0 0 20px #ff8c00);
    }

    .coin-button:active {
      transform: scale(0.9);
    }

    .coin-gfx {
      width: 180px;
      height: 180px;
      background: radial-gradient(circle at 30% 25%, #ffe4b5, #d4891a 70%, #7a4f0e);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px #ff8c00, inset 0 -5px 10px #00000080, inset 0 5px 10px #fff3cf;
      border: 3px solid #ffc864;
    }

    .coin-gfx span {
      font-size: 52px;
      font-weight: 900;
      color: #1a0f02;
      text-shadow: 2px 3px 0 #ffd58c;
    }

    .upgrade-card {
      background: #120e18;
      border: 1px solid #ff8c0060;
      border-radius: 30px;
      padding: 18px;
      margin-bottom: 15px;
    }

    .upgrade-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .upgrade-title {
      font-size: 18px;
      font-weight: 700;
      color: #ffc978;
    }

    .upgrade-cost {
      font-size: 20px;
      font-weight: 800;
      color: #ffaa00;
    }

    .upgrade-desc {
      color: #b8a58b;
      margin-bottom: 15px;
      font-size: 14px;
    }

    .buy-btn {
      width: 100%;
      background: #2a1f12;
      border: 1px solid #ff8c00;
      color: #ffdca8;
      font-weight: 700;
      font-size: 16px;
      padding: 14px;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.15s;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .buy-btn:active {
      transform: translateY(2px);
    }

    .buy-btn.disabled {
      opacity: 0.3;
      pointer-events: none;
    }

    .max-badge {
      background: #ff8c0030;
      border: 1px solid #ff8c00;
      border-radius: 20px;
      padding: 2px 12px;
      font-size: 12px;
      color: #ffb347;
      margin-left: 10px;
    }

    .status-message {
      text-align: center;
      margin-top: 15px;
      color: #eebb77;
      font-weight: 500;
      min-height: 24px;
    }

    .floating-number {
      position: fixed;
      font-weight: 900;
      color: #ffd28f;
      text-shadow: 0 0 20px #ff8c00, 0 2px 4px #000;
      font-size: 32px;
      pointer-events: none;
      z-index: 9999;
      animation: floatUp 0.8s ease-out forwards;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-100px); }
    }

    @media (max-width: 400px) {
      .coin-gfx { width: 150px; height: 150px; }
      .coin-gfx span { font-size: 42px; }
      .balance-value { font-size: 52px; }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="balance-section">
    <div class="balance-label">БАЛАНС EnFT</div>
    <div class="balance-value">
      <span id="balanceDisplay">0.0</span> ⚡
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-item">
      <div class="stat-label">СИЛА ТАПА</div>
      <div class="stat-value" id="tapPowerDisplay">0.1</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">ПАССИВ/СЕК</div>
      <div class="stat-value" id="passiveDisplay">0.0</div>
    </div>
  </div>

  <div class="tap-area">
    <button class="coin-button" id="tapButton">
      <div class="coin-gfx">
        <span>EnFT</span>
      </div>
    </button>
  </div>

  <!-- Улучшение тапа (всего 3 уровня: 0.1 → 0.3 → 0.9) -->
  <div class="upgrade-card">
    <div class="upgrade-header">
      <span class="upgrade-title">💪 УСИЛЕНИЕ ТАПА</span>
      <span class="upgrade-cost" id="tapCostDisplay">10</span>
    </div>
    <div class="upgrade-desc">
      <span id="tapUpgradeDesc">0.1 → 0.3 за тап</span>
      <span class="max-badge" id="tapMaxBadge" style="display: none;">МАКС</span>
    </div>
    <button class="buy-btn" id="buyTapBtn">УЛУЧШИТЬ</button>
  </div>

  <!-- Пассивный доход (тоже ограничен) -->
  <div class="upgrade-card">
    <div class="upgrade-header">
      <span class="upgrade-title">⛓️ ПАССИВНЫЙ ДОХОД</span>
      <span class="upgrade-cost" id="passiveCostDisplay">50</span>
    </div>
    <div class="upgrade-desc">
      <span id="passiveUpgradeDesc">+0.1 EnFT/сек</span>
      <span class="max-badge" id="passiveMaxBadge" style="display: none;">МАКС</span>
    </div>
    <button class="buy-btn" id="buyPassiveBtn">АКТИВИРОВАТЬ</button>
  </div>

  <div id="messageArea" class="status-message"></div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- СТРОГАЯ ЭКОНОМИКА (БЕЗ ЛЕГКИХ БУСТОВ) ----------
    // Уровни тапа: [0.1, 0.3, 0.9]
    const TAP_LEVELS = [0.1, 0.3, 0.9];
    const TAP_COSTS = [0, 10, 30]; // стоимость для перехода на следующий уровень
    
    // Уровни пассивного дохода: [0, 0.1, 0.3]
    const PASSIVE_LEVELS = [0.0, 0.1, 0.3];
    const PASSIVE_COSTS = [0, 50, 150]; // стоимость для покупки уровня

    // Состояние
    let balance = 0.0;
    let tapLevel = 0;          // индекс в TAP_LEVELS (0 = 0.1)
    let passiveLevel = 0;      // индекс в PASSIVE_LEVELS (0 = нет дохода)
    
    let tapPower = TAP_LEVELS[0];
    let passiveIncome = PASSIVE_LEVELS[0];

    // UI элементы
    const balanceSpan = document.getElementById('balanceDisplay');
    const tapPowerSpan = document.getElementById('tapPowerDisplay');
    const passiveSpan = document.getElementById('passiveDisplay');
    const tapCostSpan = document.getElementById('tapCostDisplay');
    const passiveCostSpan = document.getElementById('passiveCostDisplay');
    const tapUpgradeDesc = document.getElementById('tapUpgradeDesc');
    const passiveUpgradeDesc = document.getElementById('passiveUpgradeDesc');
    const tapMaxBadge = document.getElementById('tapMaxBadge');
    const passiveMaxBadge = document.getElementById('passiveMaxBadge');
    const messageDiv = document.getElementById('messageArea');
    
    const tapButton = document.getElementById('tapButton');
    const buyTapBtn = document.getElementById('buyTapBtn');
    const buyPassiveBtn = document.getElementById('buyPassiveBtn');

    let isInitialized = false;

    // Всплывающие цифры
    function showFloatingNumber(x, y, amount) {
      const floatEl = document.createElement('div');
      floatEl.className = 'floating-number';
      floatEl.textContent = `+${amount.toFixed(1)}`;
      floatEl.style.left = (x - 20) + 'px';
      floatEl.style.top = (y - 30) + 'px';
      document.body.appendChild(floatEl);
      setTimeout(() => floatEl.remove(), 800);
    }

    // Обновление интерфейса
    function refreshUI() {
      balanceSpan.textContent = balance.toFixed(1);
      tapPowerSpan.textContent = tapPower.toFixed(1);
      passiveSpan.textContent = passiveIncome.toFixed(1);
      
      // Обновление стоимостей и описаний
      if (tapLevel < TAP_LEVELS.length - 1) {
        const nextCost = TAP_COSTS[tapLevel + 1];
        tapCostSpan.textContent = nextCost;
        const nextPower = TAP_LEVELS[tapLevel + 1];
        tapUpgradeDesc.textContent = `${tapPower.toFixed(1)} → ${nextPower.toFixed(1)} за тап`;
        tapMaxBadge.style.display = 'none';
        buyTapBtn.style.display = 'block';
        
        if (balance < nextCost) {
          buyTapBtn.classList.add('disabled');
        } else {
          buyTapBtn.classList.remove('disabled');
        }
      } else {
        tapCostSpan.textContent = '—';
        tapUpgradeDesc.textContent = `${tapPower.toFixed(1)} за тап (максимум)`;
        tapMaxBadge.style.display = 'inline-block';
        buyTapBtn.style.display = 'none';
      }
      
      if (passiveLevel < PASSIVE_LEVELS.length - 1) {
        const nextCost = PASSIVE_COSTS[passiveLevel + 1];
        passiveCostSpan.textContent = nextCost;
        const nextPassive = PASSIVE_LEVELS[passiveLevel + 1];
        passiveUpgradeDesc.textContent = `+${nextPassive.toFixed(1)} EnFT/сек`;
        passiveMaxBadge.style.display = 'none';
        buyPassiveBtn.style.display = 'block';
        
        if (balance < nextCost) {
          buyPassiveBtn.classList.add('disabled');
        } else {
          buyPassiveBtn.classList.remove('disabled');
        }
      } else {
        passiveCostSpan.textContent = '—';
        passiveUpgradeDesc.textContent = `${passiveIncome.toFixed(1)} EnFT/сек (максимум)`;
        passiveMaxBadge.style.display = 'inline-block';
        buyPassiveBtn.style.display = 'none';
      }
    }

    // Сохранение/загрузка
    function saveGame() {
      if (!isInitialized) return;
      const state = { balance, tapLevel, passiveLevel };
      localStorage.setItem('enft_serious', JSON.stringify(state));
    }

    function loadGame() {
      const saved = localStorage.getItem('enft_serious');
      if (saved) {
        try {
          const data = JSON.parse(saved);
          balance = data.balance || 0.0;
          tapLevel = data.tapLevel || 0;
          passiveLevel = data.passiveLevel || 0;
        } catch(e) {}
      }
      
      tapPower = TAP_LEVELS[tapLevel];
      passiveIncome = PASSIVE_LEVELS[passiveLevel];
    }

    // Покупки
    function buyTapUpgrade() {
      if (tapLevel >= TAP_LEVELS.length - 1) {
        messageDiv.textContent = '⚠️ Максимальный уровень тапа';
        return;
      }
      
      const cost = TAP_COSTS[tapLevel + 1];
      if (balance < cost) {
        messageDiv.textContent = '❌ Недостаточно EnFT';
        return;
      }
      
      balance -= cost;
      tapLevel++;
      tapPower = TAP_LEVELS[tapLevel];
      
      messageDiv.textContent = `✅ Тап улучшен до ${tapPower.toFixed(1)}`;
      refreshUI();
      saveGame();
    }

    function buyPassiveUpgrade() {
      if (passiveLevel >= PASSIVE_LEVELS.length - 1) {
        messageDiv.textContent = '⚠️ Максимальный уровень пассивного дохода';
        return;
      }
      
      const cost = PASSIVE_COSTS[passiveLevel + 1];
      if (balance < cost) {
        messageDiv.textContent = '❌ Недостаточно EnFT';
        return;
      }
      
      balance -= cost;
      passiveLevel++;
      passiveIncome = PASSIVE_LEVELS[passiveLevel];
      
      messageDiv.textContent = `✅ Пассивный доход: ${passiveIncome.toFixed(1)}/сек`;
      refreshUI();
      saveGame();
    }

    // Тап
    function handleTap(event) {
      const earned = tapPower;
      balance += earned;
      
      let x = event.clientX || window.innerWidth / 2;
      let y = event.clientY || window.innerHeight / 2;
      showFloatingNumber(x, y, earned);
      
      refreshUI();
      saveGame();
      messageDiv.textContent = `+${earned.toFixed(1)} EnFT`;
    }

    // Пассивный тик
    function passiveTick() {
      if (passiveIncome > 0) {
        balance += passiveIncome;
        refreshUI();
        saveGame();
      }
    }

    // Инициализация
    function init() {
      loadGame();
      isInitialized = true;
      refreshUI();
      
      setInterval(passiveTick, 1000);
      
      tapButton.addEventListener('click', handleTap);
      buyTapBtn.addEventListener('click', buyTapUpgrade);
      buyPassiveBtn.addEventListener('click', buyPassiveUpgrade);
    }

    init();
  })();
</script>
</body>
</html>
